body:
  text: 侍者離知録後學性一校生生道人梓第十七法眼毫釐示衆云一雙孤雁搏地高飛一對鴛鴦池邊獨立箭鋒相拄則且致鋸解稱錘時如何舉法眼問修山主毫釐有差天地懸隔汝作麼生會誰敢動著修云毫釐有差天地懸隔閗百草有甚麼難眼云恁麼又爭得鐵山橫在路修云某甲只如此和尚又如何捩轉鼻頭眼云毫釐有差天地懸隔將謂別有修便禮拜將錯就錯師云修山主與法眼同參地藏深得傍參切磋之力這箇公案如折倒則監院悟頭一般金陵報恩玄則禪師法眼問曾見什麼人來恩云見青峯和尚眼云有什麼言句恩云某甲曾問如何是學人自己峯云丙了童子來求火眼云上座作麼生會恩云丙丁屬火將火求火如將自己求自己眼云與麼會又爭得恩云某甲只如此未知和尚尊意如何眼云爾問我我與爾道恩云如何是學人自己眼云丙丁童子來求火恩於言下頓悟法眼鉤錐在手去則印住住則印破打破則監院情關抽開修山主識鎖三祖信心銘至道無難唯嫌揀擇但不憎愛洞然明白毫釐有差天地懸隔法眼將此問修山主作箇敲門瓦子今時問著一千箇一千箇作道理會不然一向打在無事界裏是他不落尋思只道箇毫釐有差天地懸隔也大曬有蘊藉法眼方復不許道恁麼又爭得此所以為法眼一派之源也萬松到此常令學人分身兩下看前段修山主恁麼道為甚不許後段法眼却為甚恁麼道其間修山主道某甲只如此和尚又如何望箇斬新日月別作生涯是他不蹉一絲依前只道箇毫釐有差天地懸隔東禪齊云山主恁麼祗對為甚麼不肯及乎再請益法眼亦只恁麼道便得去且道誵訛在什麼處若看得透道上座有來由萬松道恁麼又爭得所以道只是舊時行底路逢人説著便誵訛修便禮拜得即得情理難容五祖戒代法眼劈脊便打萬松道果然有本出法眼語云山主徹也萬松道弄泥團漢二俱不了萬松當時見法眼道恁麼又爭得向道久聞和尚有此機要不然擺手便行管取一時坐斷待伊不信試問天童頌云稱頭蠅坐便欹傾謾他一星不過萬世權衡照不平斗滿稱錘住斤兩錙銖見端的莫錯認終歸輸我定盤星領取鉤頭意師云天童破題一句便頌毫釐有差天地懸隔廬山遠公云本端竟何從起滅有無際一微涉動境狀此穨山勢三祖道箇嫌字先自憎愛了也却道但不憎愛洞然明白諸人退步就己子細點檢看梵語三摩地此云等持不沈不掉平等任持也此可以為萬世權衡照不平者也尚書治要圖説稱有三義準者繫也衡者平也權者錘也楞嚴經云於其自住三摩地中見與見緣并所想相如虛空花本無所有此見及緣元是菩提妙淨明體云何於中有是非是到此正恁麼時不須嫌揀擇離憎愛尚無毫釐之差豈有雲泥之隔斤兩錙銖者八銖為錙三錙為兩十六兩為斤是他權衡在手底人爾將一斤來我也一移教平將一兩來也一移教平稍似錙銖增減便欹傾也諸方道領取鉤頭意莫認定盤星蓋定盤星上本無斤兩又如北辰鎮居其所鉤頭加減計在臨時萬松道有心而平未若無心而不平所以無星稱上饒人賣雙陸盤中信彩贏還會法眼道山主徹也麼稱錘移到徹梢頭忽然拶落翻斤斗第十八則趙州狗子示衆云水上葫蘆按著便轉日中寶石色無定形不可以無心得不可以有心知沒量大人語脈裏轉却還有免得底麼舉僧問趙州狗子還有佛性也無攔街趁塊州云有也不曾添僧云既有為甚麼却撞入這箇皮袋一款便招自領出頭州云為他知而故犯且莫招承不是道爾又有僧問狗子還有佛性也無一母所生州曰無也不曾減僧云一切衆生皆有佛性狗子為什麼却無憨狗趁鷂子州云為伊有業識在右具如前據款結案師云若道狗子佛性端的是有後來却道無端的是無前來却道有若道道有道無且是一期應機拶著説出各有道理所以道明眼漢沒窠臼這僧問處要廣見聞不依本分趙州道有以毒去毒以病醫病這僧又道既有為甚撞入這皮袋不知自己生入狗腹中了也州云為他知而故犯一槌兩當快便難逢這僧將謂依因判果若恁麼會作座主奴也未得後來有僧再問便却道無是他得底人道有也有出身處道無也有出身處這僧依文按本道一切衆生皆有佛性狗子為什麼却無似這一拶敢道撥天關底手轉身無路是他款款道箇為伊有業識在爾且道這僧皮下還有血麼天童不免向赤肉瘢上更著艾燋頌云狗子佛性有狗子佛性無打做一團鍊做一塊直釣元求負命魚這僧今日合死逐氣尋香雲水客穿却鼻孔也不知嘈嘈雜雜作分疏競齧枯骨啀喍嗥吠平展演沒蹺欺休廝誺大鋪舒材高語壯莫怪儂家不慎初一言出口駟馬難追指點瑕疵還奪璧白拈巧偷秦王不識藺相如當面蹉過師云狗子佛性有狗子佛性無兩段不同一併拈出正如雪竇道一有多種二無兩般天童要與趙州相見故如是頌應天真道直鉤釣獰龍曲鉤釣蝦蟆後來逐氣尋香如獵犬相似嘈雜分疏枯骨上有甚汁趙州雖大開鋪席要且只是平展商量天童與趙州解腕莫怪儂家不慎初歸宗問秀才業何經史才云會二十四家書體宗向空中一點云會麼才云不會宗云又道會二十四家書體永字八法也不識刺史李渤問三乘十二分教即不問如何是祖師西來意宗亦竪拳云會麼李云不會宗云這箇措大拳頭也不識萬松道翻身師子大家看不唯狗子佛性道有道無只這知而故犯業識性在也大曬顧前盻後慎初護末史記趙惠王得楚和氏璧秦昭王以十五城易之藺相如奉璧入秦王喜傳示美人及左右左右皆呼萬歲相如視王無割城之意乃前曰璧有瑕請示之王授璧相如因持起立倚柱髮上衝冠曰趙王齋戒五日使臣奉璧送書於庭嚴大國之威以修敬也今見王禮節甚倨得璧傳示美人似戲弄臣無割城意故臣復取璧必欲急臣臣頭與璧俱碎於柱矣王辭謝按圖割城亦齋五日相如使從者衣褐懷璧徑道歸趙趙州先縱後奪有相如手段天童別曾有頌云趙州道有趙州道無狗子佛性天下分疏面赤不如語直心真必定言麁七百甲子老禪伯驢糞逢人換眼珠趙州心真語直便是直釣元求負命魚周文王出獵見薑子牙磻溪之谷去水三尺直鉤釣魚王異之曰直鉤如何得魚子牙曰但求負命之魚驢糞逢人換眼珠此如相如奪璧也佛鑑拈出槵子數珠云諸人還見麼良久云此是老僧來京師換得底諸人各自歸堂摸𢱢看佛鑑用槵子趙州用驢糞萬松既無用處不曾移換諸人若信得及依舊眼在眉毛下第十九則雲門須彌示衆云我愛韶陽新定機一生與人拔釘楔為甚有時也開門掇出膠盆當路鑿成陷穽試揀辨看舉僧問雲門不起一念還有過也無言清行濁漢門云須彌山險師云圓通善國師道此箇公案諸方商量或云才恁麼問早是起念過如須彌或云如須彌山八風吹不動千古鎮常安或云為人難透如須彌山如此商量要且未會雲門意在若是桶子底脫紅絲線斷方知總不恁麼不見道三句明一句一句明三句三一不相涉分明向上路佛果道雲門答話多惹人識情萬松道以識情遣識情非大手段為人不能搆副此須彌山天不能蓋地不能載風吹不入水灑不著唯金剛眼睛一覻覻透便見七穿八穴直得碎如微塵然後却向眉毛眼睫上孤逈逈峭巍巍白雲端禪師頌云須彌山兮塞宇宙千手大悲看不透除非自解倒騎牛一生不著隨人後萬松道仰面獨揚眉回頭自拍手其山置和尚頌云無事投人覓罪名即時擒下喪全身未招情款驅驅者門外知他多少人唯有天童不在此限頌云不起一念須彌山一句便了韶陽法施意非慳天童也不少肯來兩手相分付只恐爾承當不下擬去千尋不可攀徒勞斫額滄海濶涵天浴日無涯岸白雲間伴鶴隨風得自由莫將毫髮著其間已太多生假雞聲韻難謾我真不掩偽未肯模胡放過關西天令嚴師云爾問我不起一念有過無過我便掇出一坐須彌山在爾面前相似其法施之利固非慳吝永嘉道大施門開無壅塞非但今日也梵語須彌此云妙高四寶所成曰妙獨出衆峯曰高四天下山中須彌最為第一爾若自肯我便兩手分付古詩道待伊心肯處是我命通時其實此事常顯露如須彌山㟮屼崢嶸誰能蓋覆未分付時爾豈無分分付與爾豈是新得不見長慶道萬象之中獨露身唯人自肯乃方親天童頌到這裏大有含蓄功夫爾若擬議不來千里萬里仰望不及璩源道此事如崖穨石裂壁立千仞不可攀攬其實爾亦不曾離我亦不曾奪此與上句迷悟相反對偶分明教中説須彌山入水八萬瑜繕那出水八萬瑜繕那非娑竭海不能涵容山既古今不動雲亦出沒常間洞山道青山白雲父白雲青山兒白雲終日倚青山總不知天童餘才頌須彌山如海闊雲間曲盡奇妙這裏容得一念起滅麼所以道滄海濶白雲間莫將毫髮著其間此又與雪竇道眼裡著沙不得同參若論韶陽不慳法施却又眼裏著得須彌山也此須彌山頌中築著磕著血脈貫通拍拍是令非妄生穿鑒增長識情也其實不起一念底人豈可更問有過無過直饒常在不起一念處點檢將來堪作什麼所以道假雞聲韻難謾我未肯模胡放過關孟嘗君入秦為相人或説王孟嘗君賢又齊族也今相秦必先齊而後秦秦其危矣王囚君欲殺君因幸姬求解姬曰妾願得君狐白裘此時裘已獻王下客能為狗盜者取裘獻姬君得出夜半至函谷關關法雞鳴而出客下客憑諼善為雞鳴群雞皆鳴君脫秦難師拈拄杖云萬松今日把關也有學雞鳴者出來復靠却拄杖云放過一著第二十則地藏親切示衆云入理深談嘲三攞四長安大道七縱八橫忽然開口説破舉步踏著便可高挂鉢囊拗折拄杖且道誰是其人舉地藏問法眼上座何往羅織人作麼眼云迤邐行腳索草鞋錢去也藏云行腳事作麼生果然放不過眼云不知何不早恁麼道藏云不知最親切就身打劫眼豁然大悟險費盤纏師云楊無為問芙蓉楷和尚相別幾年蓉云七年公云學道來參禪來蓉云不打這鼓笛公云恁麼則空遊山水百無所能也蓉云相別未久善能高鑒公大笑南泉道道不屬知不屬不知知是妄覺不知是無記今人見道不知最親切更是法眼悟頭便一向不知不會只這是也殊不知古人一句子如天普蓋似地普擎既不知最親切荷澤道知之一字衆妙之門又作麼生爾但是則總是莫坐在是處不是總不是莫坐在不是處兼通五位正偏豈可死在句下只這法眼悟處也是偶爾成文柏山大隱和尚道因禍致福也在地藏接人手段鉤在不疑之地驀下一釣法眼猛省元來却在這裏磁州老師道爾但行裏坐裏心念未起時猛提起覻見即便見不見且却拈放一邊恁麼做功夫休歇也不礙參學參學也不礙休歇投子青和尚道既金龍失水妙翅急提地藏時節因緣絲毫無間天童筆端有舌更為重宣頌云而今參飽似當時吾猶昔人非昔人也脫盡簾纖到不知猶有這箇在任短任長休剪綴枉費工夫隨高隨下自平治不勞心力家門豐儉臨時用闕鹽醋不得田地優遊信步移要行即行三十年前行腳事沒可思量分明辜負一雙眉依舊在眼上師云宗鏡道從來迷悟似迷今日悟迷非悟所以道悟了還同未悟人地藏問時要知發足道理法眼答處亦非謙讓推辭地藏就便一提道不知最親切法眼大悟元來這不知却親切臨濟問洛浦甚處來浦云欒城來濟云有事相借問得否浦云某甲不會濟云打破大唐國覓箇不會底不得臨濟常用殺人刀亦有活人劍不似地藏殺人見血為人為徹這箇不知不會脫體逈別直須脫盡簾纖方到不知不會處溈山普請開田仰山問這頭得恁麼低那頭得恁麼高溈曰水能平物但以水平之仰曰水也無憑和尚但高處高平低處低平溈然云肇公般若無知論曰諸法不異者豈曰續鳧截鶴夷嶽盈然後為無異哉所以道任短任長休剪綴隨高隨下自平治張無盡道萬般支準費工夫一切順隨成善巧只麼信口便道信手便用信腳便行春月花開秋時葉落恁麼會得行甚驢腳所以玄沙不出嶺保壽不渡河不出門知天下事覺範頌云一箇面如楪子大眼耳鼻舌分疆界髑髏裡頭都不知聽汝外邊爭揑怪口問鼻曰飲食在我言語在我汝有何功在吾之上鼻曰五嶽之中中嶽居尊鼻復問眼汝何在上眼曰吾同日月實有照鑒之功敢問眉有何功處於吾上眉曰我實無功慚居上位儻容在下眼在眉上看爾甚麼面孔是以寶月明禪師上堂云古者道在眼曰見在耳曰聞且道在眉毛喚作什麼良久云憂則共戚樂則同歡人皆知有用之用不知無用之大用且道賓頭盧尊者兩手撥眉意旨如何師撥眉云貓第二十一則雲巖掃地示衆云脫迷悟絶聖凡雖無多事立主賓分貴賤別是一家量材授職即不無同氣連枝作麼生會舉雲巖掃地次沙彌行童不得氣力道吾云太區區生埋兵挑鬪巖云須知有不區區者可惜話作兩橛吾云恁麼則有第二月也豈止第二百千萬箇巖提起掃云這箇是第幾月水晶宮裏出頭來吾便休去盡在不言中玄沙云正是第二月一人傳虛萬人傳實雲門云奴見婢殷勤隨邪撲簸箕師云道吾屈折雲巖如佛果激勵佛鑑所謂不憤不啓不悱不發是他雲巖掃地道吾間點檢他雲巖道須知有不區區者好諸仁者爾喫飯煎茶把針掃地時識取箇不區區底便得世法佛法打成一片洞上謂之兼帶去時中自不虛過道吾便見破綻道恁麼則有第二月也雪竇別云洎合放過二老人恐人離却色身別立法身忠國師謂南方禪客曰我此間佛性全不生滅汝南方佛性半生半滅半不生滅客曰如何區別師曰此則身心一如心外無餘所以全不生滅汝南方身是無常神性是常所以半生半滅半不生滅到這裏須知有箇轉身就父底時節巖遂竪起掃云這箇是第幾月此語本出首楞嚴經經云如第二月誰為是月又誰非月文殊但一月真中間自無是月非月道吾便休去有本云道吾拂袖便行萬松道勘破了也且道是雲巖勘破道吾道吾勘破雲巖明眼底試點檢看玄沙云正是第二月此老子口裏有雌黃舌上有利劍長慶云被他倒轉掃攔面𢷾又作麼生沙休去羅山云噫兩箇老漢不識好惡雲巖箇漢縛手腳死來多少時也萬松道德山門下不道不得洞山門下要且未在雪峯行腳時三到投子九上洞山一日淘米次洞山問淘砂去米淘米去砂峯云砂米一時去山云大衆喫箇什麼峯乃覆却盆山云得即得須見別人始得後果嗣德山玄沙長慶嗣雪峯羅山嗣巖頭皆出德山門下故一抑一揚言逆意順而今雲門洞上兩派齊行豈有優劣者哉雲門云奴見婢殷勤保福云雲巖大似泥裏推車步步區區二老宿亦嗣雪峯自然言氣相合意謂雲巖不能用掃𢷾打斷葛藤殊不知爛泥中有刺萬松披玩拈提未遍不覺失笑云雲巖道吾發明洞上機緣這一隊老漢衆口銷金無一人為渠雪屈賴有天童拔劍相助頌云借來聊爾了門頭當處發生得用隨宜即便休隨處滅盡象骨巖前弄蛇手欲道他人兒時做處老知羞先治自己師云若論此事如石火電光雲巖提起示人長慶攔面便𢷾用處雖殊同歸變滅洞上所以貴回機轉位也雪峯有象骨巖雪峯曾示衆云南山有一條鱉鼻蛇汝等諸人切須好看雲門以拄杖攛向面前作怕勢此豈不是奴見婢殷勤也雲巖掃地提起掃云這箇是第幾月盡與從良變為得力兒孫了也雲門至今在籬簷下所以天童放伊不過道象骨巖前弄蛇手兒時做處老知羞勝默和尚道這箇頌子有搜人短處有為人長處此天童勝默點罰雲門萬松今日翻案去也不見天童頌弄蛇話褒獎雲門全機大用雲中不下為甚如此抑揚皆在我殺活更由誰第二十二則巖頭拜喝示衆云人將語探水將杖探撥草瞻風尋常用底忽然跳出箇焦尾大蟲又作麼生舉巖頭到德山跨門便問是凡是聖這賊山便喝裂破髑髏頭禮拜未當好心洞山聞云若不是豁公大難承當厚幣甘言頭云洞山老漢不識好惡却又著忙我當時一手擡一手捺我豈不知師云德山尋常打風打雨一日巖頭展坐具德山以拄杖挑向階下頭下階收坐具便行次日上德山侍立山云那裏學得這虛頭來頭云某甲終不敢自謾山云汝已後向老僧頭上屙去在父聞子健恨不殺身見過於師方堪傳授此問諸方謂之跨門之機未必當初真跨門問來昔有外道手中藏活雀兒問世尊曰手中雀兒為活為死世尊以足跨門云汝道吾欲出欲入問是凡是聖真有此理昔日普化曾指聖僧問臨濟且道這箇是凡是聖濟便喝化云河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼濟云這老賊化出僧堂云賊賊首山云這兩箇賊有箇正賊且道那箇是正賊代云劉盆子巖頭問是凡是聖德山便喝便是與臨濟商榷勘同來相似頭禮拜亦與臨濟小廝兒却具一隻眼一般雪竇道當時才禮拜劈脊便打非唯勦絶洞山亦乃把定豁老此又與臨濟道這老賊同參洞山聞舉云若不是豁公大難承當佛果著語云傍人具眼又云只知其一不知其二萬松見處即不然佛果道洞山傍人雖具眼只見錐頭利萬松道佛果和尚雖具眼不見鑿頭方洞山故將承當贓誣巖頭要發明當初禮拜有權有實果然巖頭火到頭上急忙撲撒道洞山老漢不識好惡我當時一手擡一手捺方始點燈喫飯兩家分明也不見保寧勇和尚頌云平川走兔放蒼鷹此頌跨門之問也一捺便啖雙眼睛此頌德山喝巖頭拜毒手奪來人買去此頌洞山著價利奈何斤兩未分明正是萬松道底欲得斤兩分明麼其實佛果萬松不爭頭高頭低更看天童稱盤一上頌云挫來機風行草偃總權柄符到奉行事有必行之威佛手遮不得國有不犯之令誰敢當頭賓尚奉而主驕下以風刺上君忌諫而臣佞上以風化下底意巖頭問德山雖然父子興師一擡一捺看心行未免干戈相待師云此頌三人皆挫來機各總權柄唯巖頭德山有必行之威有不犯之令賓奉主驕在洞山巖頭君忌臣佞在巖頭德山末後兩句在洞山巖頭此箇榜樣諸方喚作揀詁水中擇乳須是鵝王便見天童針線功夫巖頭知德山有必行威不犯令故不奪機且順情禮拜洞山知巖頭不受探拔不受點罰子承父業亦有必行威不犯令故鉤頭著餌道若不是豁公大難承當豈非尚奉主驕忌諫臣佞臨濟宗風喚作紅線套索碧玉穽坑陷虎之機埋兵掉鬪諸方盡謂巖頭一擡一捺洞山錯下名言殊不知洞山一擡一捺更甚分明此非久參作者決難領略今時一等脫白沙彌見天童頌道一擡一捺看心行便道怪得禪家不肯為人説破元來都是心行故作機巧誑賺學人萬松道一分心行是一分慈悲不喫一交不學一便可謂果從花裏得甘向苦中來巖頭擡捺洞山賺出洞山擡捺萬松説破忽有箇出來禮拜萬松却放過不打何也為伊皮下無血第二十三則魯祖面壁示衆云達磨九年呼為壁觀神光三拜漏泄天機如何得掃蹤滅迹去舉魯祖凡見僧來便面壁相見了也南泉聞云我尋常向他道空劫以前承當不考自招佛未出世時會取和尚會也未尚不得一箇半箇只為漏栓索他恁麼驢年去忙者不會師云池州魯祖山寶雲禪師凡見僧來便面壁自達磨九年之後無人再行此令且教諸方問佛問祖向上向下底大家識些痛癢南泉是他同參見人針錐不動便與打傍通注破我尋常向他道空劫以前承當佛未出世時會取不得一箇半箇意似放開一線其實替他侍者傳法旨了也又道他恁麼驢年去意似責他太孤峻生其實賞他覿面分付不見道直饒説得十分爭似一回親到所以靈山如畫月曹溪如指月爭似魯祖在水晶宮中廣寒殿裡披襟相見保福見南泉魯祖破綻問長慶道只如魯祖節文在什麼處被南泉恁麼道萬松道保福如何道節文二字來若非不萌枝上解辨春秋難置此問長慶對云退己讓人萬中無一萬松道古人得恁麼眼明玄覺云南泉為復是唱和語不肯語萬松道半遮半掩謾渠一點不得翠巖芝云何勞如此萬松道已是起模畫樣了也又云若有僧來見箇什麼萬松道猶嫌少在復云知時好萬松道若是陶淵明攢眉便歸去又云我即不然未具胞胎不得會會得則打折爾腰萬松道和尚棒教誰喫羅山云王老師當時若見背上與五火抄為伊解放不解收萬松道五更侵早起已有夜行人玄沙云我當時若見也與五火抄萬松云惱亂春風卒未休雲居錫云羅山玄沙總恁麼道為復一般別有道理萬松道共計十火抄又云若揀得出許尚座佛法有去處萬松道好與五火抄諸仁者爾看南泉恁麼貶屈魯祖長慶却道正是退己讓人魯祖把斷關津羅山却道解放不解收盡是魚前布網賊過張弓更看天童別作甚麼向當頌云淡中有味誰教爾添鹽著醋妙超情謂別日爾商量綿綿若存兮象先已落第二兀兀如愚兮道貴無人著價玉雕文以喪淳和尚手高珠在淵而自媚少賣弄十分爽氣兮清磨暑秋體露金風一片間雲兮遠分天水好事多魔師云昔徒單二駙馬赴南京任道過磁州大明入堂隨喜見僧面壁而坐駙馬曰一箇好淡漢詮大師曰淡中有味水性本淡加之以茶蜜甘苦生焉性亦恬憺派之以迷悟則凡聖立焉雖曰淡中有味斯乃無味之味其味恆然妙超情謂情字從心謂字從言到此言語道斷心行處滅法眼道理極忘情謂如何有喻齊道德經谷神不死章云玄牝之門是為天地根綿綿若存又曰吾不知誰子象帝之先衲僧為言綿綿若存不可一向斷絶去也象帝之先者空劫以前佛未出世時也如愚道貴暗用雪竇道貴如愚頌云雨過雲凝曉半開數峯如畫碧崔嵬空生不解巖中坐惹得天花動地來此頌空生宴坐天帝雨花今魯祖不能省事惹得南泉玄沙一隊老漢點檢此正是玉雕文以喪淳不若他珠在淵而自媚晉書陸機崇文賦曰石蘊玉以山輝水懷珠而川媚石中蘊玉而為南泉輩琢開水中懷珠而為玄沙輩漉出幸自十分爽氣清磨暑秋剛為一片間雲遠分天水萬松不曾面壁爾這一隊來覓什麼節文自代云聽説天童頌古第二十四則雪峯看蛇示衆云東海鯉魚南山鱉鼻普化驢鳴子湖犬吠不墮常塗不行異類且道是什麼人行履處舉雪峯示衆云南山有一條鱉鼻蛇汝等諸人切須好看提起坐具云這箇不是倩來底長慶云今日堂中大有人喪身失命聞風便揚僧舉似玄沙壘不過三沙云須是我稜兄始得狐朋狗黨然雖如是我即不恁麼別有一條長便請拈出僧云和尚作麼生毒蟲頭上措癢沙云用南山作麼只者鼇鼻猶為分外雲門以拄杖攛向峯面前作怕勢何得自傷己命師云南山鱉鼻雖是死蛇象骨巖前解弄也活雪峯拈來示衆本要以毒去毒長慶只解順水推船道今日堂中大有人喪身失命若解逆風把柂雪峯須入涅槃堂始得玄沙聞舉云須是我稜兄始得這裏有些子誵訛若道玄沙許長慶為甚麼却道我即不恁麼不唯順水推船更解逆風把柂這僧不顧危亡便間和尚作麼生玄沙只道箇用南山作麼這裏便見弄活蛇手雲門便攛拄杖作怕勢用得最親雲巖掃地話頌中曾舉象骨巖前弄蛇手兒時做處老知羞為雲門道奴見婢殷勤便騎賊馬趁賊也不妨惡手腳今日再頌弄蛇話誇拏龍手看他大斧斫了手摩挲頌云玄沙大剛當機不讓父長慶少勇見義不為南山鱉鼻死無用擔條斷貫索風雲際會頭角生時來蚯蚓作蛟龍果見韶陽下手弄忍俊不禁下手弄弄不出即休兩回三度激電光中看變動眨眼喪身失命在我也能遣能呼少賣弄於彼也有擒有縱七寸在手底事如今付阿誰萬松老漢冷口傷人不知痛阿耶阿耶師云玄沙專使馳書上雪峯峯拆開乃見三張白紙示其僧云會麼僧云不會峯云不見道君子千里同風僧回舉似沙沙云山頭老和尚蹉過也不知玄沙承嗣雪峯尋常證父攘羊當仁不讓道要南山作麼此又果毅無前太剛之甚長慶隨邪便道大有人喪身失命不解師子返擲此真見義不為是無勇也風雲際會頭角生果見韶陽下手弄此頌雲門覿面拈出一條活蛇不同諸師弓柸現影能遣能呼者俚諺有云呼蛇即易遣蛇即難有擒有縱者此頌既攛向面前復作怕勢已能擒縱必解遣呼天童末後道底事如今付阿誰冷口傷人不知痛但凡拍頌歸於自己拈向面前始是作家雪竇亦云如今藏在乳峯前來者一一看方便師高聲喝云看腳下萬松道雪竇貪觀腳下不知穿過髑髏天童冷口傷人明人不作暗事我當時若作雲門以拄杖攛向雪峯懷裏擬議不來隨後教伊自作自受親遭一口為什麼如此今朝二月二暫放龍擡頭第二十五則鹽官犀扇示衆云剎海無涯不離當處塵劫前事盡在而今試教伊覿面相呈便不解當風拈出且道過在什麼處舉鹽官一日喚侍者與我過犀牛扇子來要且少他不得者云扇子破也未舉時却完全官云扇子既破還我犀牛兒來不見道破也何不領話者無對扇子猶在雖有如無資福畫一圓相於中書一牛字出巧新行能做會賣師云杭州鹽官縣鎮國海昌院齊安禪師本唐皇宗枝宣宗在潛為僧將謁師師預知告主事大禁雜言止約橫事帝住久忽辭師密謂曰時至矣無滯泥蟠兼囑以佛法後事武宗滅教六年宣宗復興師有力焉帝將詔師歸宮供養師化已久帝惻愴追諡悟空禪師師一日喚侍者與我過犀牛扇子來侍者道扇子破也也是平實父子説話師云扇子既破還我犀牛兒來此乃全身入草養子之緣侍者無對却也因邪打正只是自不知有投子代云不辭拈出恐頭角不全萬松道善能修補雪竇拈云我要不全底頭角萬松云乃吾家之舊物石霜云若還和尚即無也萬松道當面諱却雪竇拈云犀牛兒猶在萬松道明眼難謾保福云和尚年尊別請人好萬松道恩多怨深雪竇拈云可惜勞而無功萬松道好心不得好報據這一隊老漢空説道理扇子與牛兒終拈掇不出唯資福畫一圓相於中書一牛字扇子犀牛斬新不動雪竇拈云適來為甚不拈出其實道扇子破也何曾動著分毫適來不拈出又何曾少而今拈出也不曾添天童賞資福拈得出用得親標名挑請特為煎點一上頌云扇子破索犀牛一不做二不休棬攣中字有來由強如説道理誰知桂轂千年魄埋根千丈妙作通明一點秋現世生苗師云諸方謂扇畫犀牛玩月或云犀角為扇或云以犀為柄皆得名為犀牛扇也鹽官當時開箇鋪席各人拈出一柄獨資福親手新樣脫體偏別師嘗示衆云隔江見資福剎竿便回後腳跟下好與三十棒豈況過江來時有僧才出師云不堪共語大抵講肆貴説到宗門貴用到以棬攣中字最有來由玄沙示衆云吾有正法眼藏付囑摩訶迦葉猶如畫月曹溪竪拂子猶如指月桂轂乃月也涅盤經世尊放月愛光阿闍世王熱惱清涼所以道誰知桂轂千年魄妙作通明一點秋可謂大柄若在手清風常及身犀牛扇話拈頌最多要且端的不曾與鹽官相見萬松若作侍者見道與我過犀牛扇子來有甚羽蒲紙竹綾絹棕𤛆信手拈來便與一柄何者縱有千般巧終無兩樣風第二十六則仰山指雪示衆云氷霜一色雪月交光凍殺法身清損漁父還堪賞玩也無舉仰山指雪師子云還有過得此色者麼仰山不覺平地喫交雲門云當時便與推倒不奈船何打破戽斗雪竇云只解推倒不解扶起路見不平拔劍相助師云古人臨機遇物發明空劫以前一段大事法華經云純一無雜具足清白梵行之相説者以謂白是衆色之本一乘是諸乘之源而不説白色向上更有事在故仰山指雪師子示衆云還有過得此色者麼且白是衆色之本雪色至白如何更有過此色者萬松道既稱為色必與眼對過白之色唯無色者不與眼對雲門所以道當時便與推倒若便向至白無白處認著正是墮在無色界中雪竇所以別指出一條活路向推倒處却教扶起佛眼云若向這裏扶持起來甚生次第事萬松道若是他宗異派不道不得更須知有洞上宗風正倒時便起正起時便倒底時節然後起倒同時起倒不立更買草鞋行腳三十年不見佛覺頌云一色無過指示人白銀世界裏頻申超然推倒還扶起爭似東風煦日新萬松道日出後一場懡㦬一等學人見雲門推倒雪竇扶起便作機鋒轉換大用無方會見向一色邊不得色邊會以為宗旨血脈已有佛覺為證如或不信更問天童頌云一倒一起雪庭師子恰似箇活底慎於犯而懷仁識法者恐勇於為而見義路見不平清光照眼似迷家東西不辨明白轉身還墮位更上一層樓衲僧家了無寄且過一生同死同生何此何彼刀斧斫不開暖信破梅兮春到寒枝收得返魂香涼飈脫葉兮秋澄潦水來撾塗毒鼓師云雲門一倒雪竇一起仰山指師子要過此色三箇鼎足闕一不可三玄三要盡在於茲仰山恐人坐在明白裏豈非慎犯懷仁也指似於人令過此色豈非勇為見義也魯語曰見義不為無勇也雲門又恐坐在一色邊也豈非慎犯懷仁便與推倒亦勇為見義也雪竇恐人只解推倒乃慎犯懷仁也更能扶起勇為見義也不見趙州道老僧不在明白裏良以清光照眼猶自迷家明白轉身未免墮位只解推倒不解扶起而堪作什麼本色衲僧如珠走盤雖同死同生而不居生死雖無彼無此而權立彼此末後兩句有時太陽門下有時明月堂前萬古長空一朝風月朝菌蟪蛄且道而今是什麼時節且隨老木同寒瘠將逐春風入燒瘢第二十七則法眼指簾示衆云師多脈亂法出姦生無病醫病雖以傷慈有條攀條何妨舉話舉法眼以手指簾莫道不知莫道不見時有二僧同去捲簾同行不同步眼云一得一失劍下分身師云法眼齋前上參以手指簾二僧同去捲簾眼曰一得一失東禪齊云上座作麼生會有云為伊不明旨便去捲簾亦有道指者則會不指而去者則失恁麼會還可不可既不許恁麼會且問上座阿那箇得阿那箇失萬松道泥裏洗土塊此非但法眼南泉一日謂僧曰夜來好風僧亦曰夜來好風泉曰吹折門前一株松僧亦曰吹折門前一株松泉次謂一僧曰夜來好風僧曰是什麼風泉曰吹折門前一株松僧曰是什麼松泉曰一得一失指簾話極有為人作略二僧捲簾在當人分上自有兩條路子法眼先與一印印定更無移改在法眼分上明暗相參殺活機大人境界普賢知諸方皆以離得失忘是非為上法眼走入是非海裏得失坑中作活計蓋無得失人可以定天下之得失萬松恁麼提唱也有得有失諸人恁麼上來也有得有失唯深明利害之端者可以較其損益孫箇喚做現成公案不勞再勘為伊不能倒斷不免天童引惹詞訟頌云松直棘曲鶴長𠒎短不得動著羲皇世人俱忘治亂葫蘆提鏨得肥其安也潛龍在淵佛眼覷不見其逸也翔鳥脫絆斫頭望不及無何祖禰西來上梁不正裏許得失相半下柱參差蓬隨風而轉空業識茫茫無本可據船截流而到岸順水張帆難逢快便箇中靈利衲僧罵街醉漢誰敢承頭看取清涼手段我這裏也有只是罕遇其人師云古人不得已強名本分事松直棘曲鵠白烏玄本出楞嚴經天童點化鶴長𠒎短莊子云長者不為有餘短者不為不足是故𠒎脛雖短續之則憂鶴脛雖長斷之則悲俗諺云要不悶依本分豈直羲皇世人俱忘治亂孔子謂西方有大聖人不治而不亂治亂者得失也三祖云得失是非一時放却周易乾卦初九潛龍勿用九四或躍在淵秦臺記王次仲年弱冠變蒼頡古文為隸書秦始皇徵之不起上怒檻車囚之赴國路化作鳥脫羈絆飛至西山落二翮今媯川縣有大翮碢即其處也此頌上古之風出處行藏各安其分佛未出世有多少經論公案及至祖師西來便有得有失何不向未指簾時會取隨風轉空截流到岸此二句點出二僧得失天童大有功夫不易恁麼道若無活人手爭能殺得人是故又道箇中靈利衲僧看取清涼手段且道據什麼令便得如此待爾喫棒了向爾道第二十八則護國三懡示衆云不挂寸絲底人正是裸形外道不嚼粒米底漢斷歸焦面鬼王直饒聖處受生未免竿頭險墮還有掩羞處麼舉僧問護國鶴立枯松時如何步步登高易國云地下底一場懡㦬心心放下難僧云滴水滴凍時如何法身無被不禁寒國云日出後一場懡㦬雪消露出死人來僧云會昌沙汰時護法善神向甚麼處去也點即不到國云三門頭兩箇一場懡㦬到即不點師云隋州隋城山護國淨果大師諱守澄與二世演化大師諱知遠同在湖南報慈慈升座師問如何是真如佛性慈曰誰無參退首座問汝適來問和尚話還會麼師曰不會座曰和尚恁麼慈悲汝為什麼不會真如佛性誰無乃至四生六道悉皆具足師曰感謝首座為某説破淨果在傍咬齒曰這老漢自家無眼更瞎他人乃召師問首座適來説箇什麼師曰某當時不會得他説破具如前舉淨果曰上座佛法不是這箇道理汝若不信去問取堂頭師上堂頭具説前解慈亦曰佛法不是這箇道理師曰適來問第三座他亦不肯故教來問且望慈悲為某決破慈曰汝去問取第三座去師下來禮問淨果曰汝但問來師便問如何是真如佛性淨果曰誰有師於言下契悟再拜謝了乃曰首座或在衆或出世某誓願佐助後遂相繼住持此話諸方謂之護國三懡㦬與保福四謾人為對未透關者極難奔湊不見僧問雲居簡禪師孤峯獨宿時如何居云九間僧堂裏不臥誰教爾孤峯獨宿此話雖無玄妙甚有開發舉此一隅三隅可見洞山玄中銘峯巒秀異鶴不停機靈木迢然鳳無依倚這僧却問鶴立孤松時如何這僧癡坐功夫既到將這些子本地風光貼在額頭逢人呈似殊不知孤危不立道方高天台教中謂之頂墮所以護國道地下底一場懡㦬這僧不向孤危處作活計又將氷枯雪老處呈上又不知乾嚗嚗時還生津潤冷清清處却要溫和所以道日出後一場懡㦬這僧戈中兩翻上來兩被護國格下既沒奈何却問教門興廢疑難道會昌沙汰時護法善神向什麼處去也唐武宗好仙沙汰僧尼二十六萬五百人會昌五年八月下旬勒令歸俗帝服方士丹藥性加躁急喜怒不常至六年三月初才及半年以丹毒死宣宗即位佛寺復增三倍之多以神道為論不假武宗小廢何致宣宗大興善神權巧之方斷非凡下可及若以衲僧見處法門本無興廢善神豈有去來所以道三門頭兩箇一場懡㦬萬松恁麼道錯為人下注腳了也又不見僧問心法雙忘時如何國云不洗面僧云月落寒潭時如何國云不洗面僧云光境俱忘時如何國云不洗面不可總從頭注解將去也不注解時如何自有天童頌古壯士稜稜鬢未秋恨天不到男兒不憤不封侯貪程太速翻思清白傳家客已太多生洗耳溪頭不飲牛末後太過師云三祖道大道體寬無易無難小見狐疑轉急轉遲昔有二僧同行性急者在前呼在後者云光陰迅速疾走上來後僧云大道廣濶忙作甚麼萬松嘗見圓通善國師手書二頌云光陰迅速疾走上來路頭踏著優鉢花開大道廣濶忙作什麼放開肚皮一時包裹此圓通善國師二頌如這僧恁麼問護國恁麼答各具一隻眼天童頌中前兩句如鋭氣貪榮後兩句如退身致仕後漢班超家貧常傭寫書乃投筆曰大丈夫當效張騫傅介子立功異域以取封侯萬里之外焉能久事於筆硯間乎後討西國封定遠侯此喻這僧三問探頭太過也後漢楊震任荊州太守性公廉不受私謁子孫蔬食步行故舊長者欲開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎史記許由隱於箕山依山而食就河而飲堯讓帝位由聞之臨河洗耳巢父飲牛問曰凡人洗面公獨洗耳由曰聞堯請我為九州長故洗是非父曰豫章之木生於高山工人莫得子欲避世何不深藏今遊人間苟求名譽行待下飲恐污牛口乃牽上流飲之天童以楊震許由巢父三人頌三懡㦬却被同安道濁者自濁清者清菩提煩惱等空平這僧與護國放下了也不干諸人事各請逐便第二十九則風穴鐵牛示衆云遲棊鈍行爛却斧柯眼轉頭迷奪將杓柄若也打在鬼窟裏把定死蛇頭還有變豹分也無舉風穴在郢州衙內上堂云祖師心印狀似鐵牛之機針札不入去即印住拽回鼻孔住即印破截斷腳跟只如不去不住印即是不印即是泥裏洗土塊時有廬陂長老出問云某甲有鐵牛之機請師不搭印宛有逆水之波穴云慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙引魂幡子搐氣袋陂佇思已過鬼門關穴喝云長老何不進語已臨崖岸更與一推陂擬議許多時節甚處去來穴打一拂子云還記得話頭麼試舉看為人為徹殺人見血陂擬開口猶自不伏燒埋穴又打一拂子仍少三十棒牧主云佛法與王法一般不會做官看傍州例穴云見箇什麼却好與一拂子牧云當斷不斷返招其亂自罵自招穴便下座得意濃時正好休師云無盡居士舉臨際辭溈山仰山侍其傍溈曰此人他日法道如何仰曰他日法道大行吳越遇風即止又問其嗣之者何人仰曰年代深遠未可言耳溈固問之曰吾亦欲知仰云經不云乎將此深心奉塵剎是則名為報佛恩居士曰吾以此知風穴仰山之後身也穴初參雪峯五年一日請益臨際會下兩堂上座舉頭相顧各下一喝僧舉問際未審具賓主眼否際曰雖然如是賓主歷然雪峯敘與巖頭欽山進途而值臨際已逝不及參則曰汝欲會當問取他子孫穴舉似南院顒院云雪峯古佛也師後住汝州風穴山廣慧禪院五代離亂郢州牧主請師衙內住夏一日牧主請升座示衆云祖師心印狀似鐵牛之機不同石人木馬玄唱玄提直下如鐵牛無爾近傍處爾才去鉤回才住打教百雜碎只如不去不住印即是不印即是可謂鉤頭有餌盧陂長老亦是際下兒孫便拈轉他話頭置問不妨奇特道某甲有鐵牛之機請師不搭印其奈風穴據令而行便道慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙鯨鯢橫海大魚也莊子任公子五十犗為餌曾得此魚蛙步𩥇泥沙有説漢武帝時有暴利長渥窪水傍見群野馬中有奇者來飲水因作土人持勒絆于傍習以為常以人代之收得其馬欲神異其馬謂從水出遂傳為龍種穴謂馬出清水反偃𩥇泥沙中此説迂回風穴衆吼集明作蛙步不見雪竇頌犀牛扇話了復云若要清風再振頭角重生請禪客下轉語乃云扇子既破還我犀牛兒來時有僧出云大衆參堂去竇喝云拋鉤釣鯤鯨釣得箇蝦蟆以此兩句對風穴上下兩句蛙字無疑也陂佇思問話呈機要與風穴相見而忽遭點要別尋出長投至爾施呈槍法一樬簷打倒也此不解奪機行令賓主互換之過也牧主久參風穴不無見處道佛法與王法一般風穴收得安南又憂塞北便問牧主道見箇什麼這裏便好與盧陂雪屈却只道當斷不斷反招其亂也不妨説到風穴為伊是俗官飲氣吞聲便下座二尊宿一龍一蛇做剛做柔篁鼓臨際宗風更著天童斷和頌云鐵牛之機哮吼也未印住印破鉤錐在手透出毗盧頂𩕳行將上不足却來化佛舌頭坐匹下有餘風穴當衡世情看冷暖盧陂負墮人面逐高低棒頭喝下豈容分説電光石火不待消停歷歷分明珠在盤不撥自轉眨起眉毛還蹉過和聲便打師云鐵牛之機印住印破閩王遣使送朱記到保福上堂曰去則印住住則印破僧曰不去不住用印奚為保福打之僧曰恁麼則山鬼窟裏全因今日也保福默然萬松道可惜龍頭蛇尾風穴若不超證無住無依大解脫門不能透出毗盧頂𩕳行也唐肅宗問忠國師如何是無諍三昧國師云檀越踏毗盧頂上行此明法身向上非枯椿邊事風穴先據此令却來佛事門中掌莫大威權斷不了公案掃除凡聖情量坐斷報化佛頭臨際廣語云山僧見處坐斷報化佛頂恁麼當衡直饒盧陂作家亦有時負墮也西天外道立義不成者謂之負墮斬頭截臂以謝不敏此棒頭喝下鈷鎚電光石火機變皆暫時光境慎勿以定奪得失決斷勝負如珠走盤眨眼蹉過也師以拂子擊禪床云了第三十則大隨劫火示衆云絶諸對待坐斷兩頭打破疑團那消一句長安不離寸步太山只重三斤且道據甚麼令敢恁麼道舉僧問大隨劫火洞然大千俱壞未審這箇壞不壞愁人莫向愁人説隨云壞早是那堪僧云恁麼則隨他去也目前可驗隨云隨他去下坡不走更與一推僧問龍濟劫火洞然大千俱壞未審這箇壞不壞同病相憂濟云不壞打破契頭捩轉鼻孔僧云為甚不壞又恁麼來濟云為同大千生鐵鑄成師云益州大隨法真禪師或云福州西院亦曰長慶大安之子百丈大智之孫參見六十餘員尊宿在溈山會中作火頭溈問子在此數年不解致箇問頭隨云教某甲問箇甚即得山云爾不解問道如何是佛隨以手掩溈山口山云爾以後有片瓦蓋頭覓箇掃地人也無後於棚口路煎茶接待往來三年開山住大隨僧問劫火洞然大千俱壞未審這箇壞不壞此問本出仁王護國經斑足王信外道羅陀語取千王頭淫祀冢間摩訶迦羅大黑天神冀延國祚普明王請一日假依七佛法齋百法師第一法師為王説偈劫火洞然大千俱壞此偈凡三十二句王赴死轉為諸王説斑足疑問亦聞此偈心開悟解以國付弟出家得忍據教中説三千大千世界同一成壞漢武帝鑿昆明池得灰問東方朔朔曰請問西域道人至後漢明帝摩騰竺法蘭來問之曰劫灰也雲庵問講師火災起時世間虛空許多灰燼將置何處罕有答者止觀羅漢如炭辟支如灰菩薩如餘少灰佛如劫火無炭無灰此問這箇壞不壞佛果道這僧元來不知話頭落處且道這箇是甚麼隨云壞此語反常合道極難咬嚼僧云恁麼則隨他去也這僧也好笑不知執鞭墜鐙多少時也隨云隨他去萬松道僧隨大隨去大隨隨僧去雪竇與修山主同時未見修山主答後段不壞為同大千話單頌大隨話云劫火光中立問端衲僧猶滯兩重關這句人多錯會道大隨道壞是一重關修山主道不壞是兩重也爾不看前話單頌大隨雪竇未見修山主語録但以問頭這箇壞不壞已是兩重關也可憐一句隨他語萬里區區獨往還此頌這僧不會大隨語直往舒州問投子子云西川有古佛出世汝速回彼僧回隨已化唐僧景遵題云了然無別法唯道印南能一句隨他語千山走衲僧雪竇用此聯意道頌後一聯也寒蛩嗚砌葉靜夜禮龕燈吟罷孤窗月徘徊恨不勝天童頌古更添修山主話道不壞為同大千有本道為他不同大千這話最好看道同也得不同也得將錯就錯無可不可修山主又云壞也礙塞殺人不壞也礙塞殺人萬松道大隨道壞也有出身處修山主道不壞也有出身處不是一向無意度不可一向情識會不見江西志徹禪師問六祖涅盤經中常無常義祖曰無常者佛性也有常者善惡一切諸法分別心也徹曰經説佛性是常和尚却言無常善惡諸法乃至菩提心皆是無常和尚却言是常此即相違令學人轉生疑惑祖曰佛性若常更説甚善惡諸法吾説無常正是佛説真常之道也又一切諸法若無常者則物物皆有自性容受生死而真常性有不遍處吾説常正是佛説真無常義也今時初心見大隨道壞隨他去未免䁝惑傍參六祖可以無疑也況大隨百丈親孫修山主地藏嫡子超情離見曲為今時雪竇當時只頌一半天童今日始得完全頌云壞不壞佛手揀不出隨他去也大千界沒量大人語脈裏轉却句裏了無鉤鎖機粘牙帶齒亦不少腳頭多被葛藤礙誰教爾生枝引蔓會不會心忙手急分明底事丁寧曬是盲者過非日月咎知心拈出勿商量牙人見販子輸我當行相買賣堂屋裏販揚州師云雪竇頌這僧問這箇壞不壞道衲僧猶滯兩重關天童頌首言壞不壞其意不同雙舉二僧問端雙收二師答處一時拈向面前唯隨他去也大千界就大隨語出二師鉤線點二僧趁塊雲居示衆云言語如鉆如挾如鉤如鎖須教相續不斷始得今頌二師答處直捷便與不涉廉纖爭奈諸方已被葛藤絆倒也真點胸嘗客南昌漳江寺政禪師席下一日摳衣露脛緩步而過政怪問之真曰前廊後架皆是葛藤真恐絆倒耳政為大笑天童道我恁麼分明頌出爾會那不會若是久參上士如當行買賣不索商量萬松今日只唬得離家第三十一則雲門露柱示衆云向上一機鶴沖霄漢當陽一路鷂過新羅直饒眼似流星未免口如匾簷且道是何宗旨舉雲門垂語云古佛與露柱相交是第幾機落七落八了也衆無語却與露柱同參自代云南山起雲北山下雨張翁喫酒李翁醉師云本録雲門問僧古佛與露柱相交是第幾機僧無語門云爾問我與爾道僧遂問門云一條絛三十文僧云如何是一條絛三十文門云打與代前語云南山起雲北山下雨唐宋開府璟善羯鼓歌有云南山起雲北山下雨借用如觀世音菩薩將錢來買糊餅放下手元來却是饅頭全似睦州機鋒盞子落地楪子成七片豈容詮注話會天童能向詮注不及處詮注話會不到處話會頌云一道神光上柱天下柱地初不覆藏淨裸裸赤灑灑超見緣也是而無是烈火焰中休眨眼出情量也當而無當劍輪鋒外莫回頭巖華之粉兮蜂房成蜜神通廣大野草之滋兮麝臍作香變化無方隨類三尺一丈六主山高案山低拄杖長拂子短明明觸處露堂堂拶破面門無處回避師云雲門云人人盡有光明在看時不見暗昏昏又道虛空包不盡大地載不起楞嚴此見及緣皆是菩提妙淨明體云何於中有是非是肇公般若無知論云夫無當則物無不當無是則物無不是物無不是故是而無是物無不當故當而無當故經云盡見諸法而無所見也此頌明依一經一論暗指超情離見人境交參古佛既與露柱相交自然南山起雲北山下雨蜂採花而成蜜麝食草而作香高低嶽瀆共轉根本法輪大小鱗毛普現色身三昧劬尸羅長者覩三尺而無盡無邊身菩薩窮上界而有餘無一時不現無一處不遍故云明明觸處露堂堂師復云還見麼瞎第三十二則仰山心境示衆云海為龍世界隱顯優遊天是鶴家鄉飛鳴自在為甚麼困魚止濼鈍鳥棲蘆還有計利害處麼舉仰山問僧甚處人閉門刷會僧云幽州人公驗明白山云汝思彼中麼恰待忘了僧云常思熟處難忘山云能思是心所思是境元來更立能所彼中山河大地樓臺殿閣人畜等物反思思底心還有許多般麼仁者自生分別僧云某甲到這裏總不見有猶有這箇山云信位即是人位未是庭前殘雪日輪消室內紅塵遣誰掃僧云和尚莫別有指示否便恁麼來山云別有別無即不中射透兩重關據汝見處只得一玄已有船中月得坐披衣向後自看更添帆上風師云仰山昔嘗問僧甚處來僧云幽州來仰云我恰要幽州信幽州米作麼價僧云某來時無端穿市中過踏折他橋梁仰便休仰山小釋迦接人非止一路此箇公案正是學人入門之勢下手得力處山問幽州僧汝還思彼中麼當時被他道不思又作麼生仰山必然別有長處僧却云常思實語當懺悔山云能思是心所思是境境則千差能思底心有多番麼雲門曾道仰山為慈悲之故有落草之談果然僧也靈利道某甲到這裏總不見有今時人萬一不到這境界若到即點胸擔板不知途路之樂終不到家仰山曾行山下路來故別指一條活路仰山昔年僧堂前三昧次夜半不見山河大地寺宇人物以至己身全同空界明晨舉似大溈溈曰我在百丈時得此境乃是融通妄想銷明之功汝向後説法有人過者無有是處萬松道非仰山不證非溈山不識楞嚴經云若動念盡浮想銷除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本此又見溈仰父子妙契佛心也仰山一日呈解云若教某自看到這裏無圓位亦無可斷溈曰據汝見處猶是法在亦未離心境仰曰既無圓位何處更有心境溈曰適來汝作恁麼解是否仰云是溈云若恁麼具足是心境法爭得道無仰山見這僧有這箇在依理判斷道信位即是人位未是別本云信位即得行位即未多舉金剛三昧經信位思位修位行位捨位今言信位人位未必全同竹庵圭和尚道向開口合口處分這邊那邊有言無言處分信位人位此又別一家也溈山問仰山寂子速道莫入陰界仰云慧寂信亦不立溈云子信了不立不信不立仰云只是慧寂更信阿誰溈云若恁麼則是定性聲聞也仰云慧寂佛亦不見清居皓升禪師牧牛圖至第六章云信位漸熟邪境覺疏雖辨淨穢如劍利泥猶存鼻索未可憑信故白黑相半頌曰野牧雖云久牽繩手漸離行持非暗昧進習不依隨淨地于于樂長鞭每每持青山香草細一味日充飢至十二章人位本空身心無著得失淨盡玄玄道路邈無分別向上一句擬議即墮頌曰妄起勞看牧牛非人亦非正中妄想像向上有玄微大海纖塵起洪爐片雪飛相逢求解會不墮汝心機萬松道仰山信亦不立清居人位本空若向二師話中揀得出信位人位昭然可見所謂退步就己萬不失一也僧云和尚莫別有指示否爛泥裏有刺仰云別有別無即不中有即雪上加霜無即死在句下所以指一玄教伊自看湧泉空處為座萬行為衣有以坐謂安禪靜慮衣謂衲帔蒙頭有以坐謂開堂升座衣謂法服嚴身皆有理在且道向後自看看箇什麼問取天童頌云無外而容大無不包無礙而沖細無不入門牆岸岸莫探頭好關鎖重重不消彈指酒常酣而臥客喚醒來打飯雖飽而穨農一坑埋却突出虛空兮風搏妙翅穿開碧落天踏翻滄海兮雷送遊龍驚蟄二月節師云天童先頌返思能思底豈有多般雲門道會得也目前包裹會不得也目前包裹此無外而容也山河樓閣人畜等物一多無礙人境交參此無礙而沖也韶國師道通玄峯頂不是人間心外無法滿目青山通玄峯頂所思境也不是人間能思心也心外無法總不見有也滿目青山只此一句這僧與韶國師相隔信位人位一玄三玄直得門牆岸岸關鎖重重卒難相見也又頌這僧見處如醉客頽農仰山指處如妙翅遊龍法華經譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏其人醉臥都不覺知逍州云曾聞一飽忘百飢今日山僧身便是趙州一飽忘百飢合受人天妙供這僧飯飽頽農滴水難消明眼人辨取梵語迦樓羅此云妙翅鳥搏風闢海直取龍吞孔子問禮於老聃謂見老子其猶龍也遊龍雲煙出沒非同潛蟄者此頌人位未是只得一玄向後自看教渠移身換步何也但有路可上更高人也行
