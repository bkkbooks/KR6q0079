body:
  text: 侍者離知録後學性一校生生道人梓第一則世尊升座示衆云閉門打睡接上上機顧鑑頻申曲為中下那堪上曲木弄鬼眼睛有箇傍不肯底出來也怪伊不得舉世尊一日升座今日不著便文殊白槌云諦觀法王法法王法如是知他是何心行世尊便下座別日再商量師云圓收十號出世獨尊抖擻眉毛昂藏鼻孔講肆謂之升座禪林號曰上堂諸人未到法堂萬松未出方丈向那時薦得已是落三落四了也不見雪竇道衆中若有仙陀客何必文殊下一槌點檢將來雪竇不合索鹽萬松那堪奉馬直饒七佛祖師道諦觀法王法法王法如是也須眼裏抽釘腦後拔楔始得至今開堂末後白槌云諦觀法王法法王法如是舉此例也世尊便下座去且救得一半那一半分付天童頌云一段真風見也麼莫教飄入眼特地出還難綿綿化母理機梭參差蹉了交綹織成古錦含春象大巧若拙無奈東君漏泄何陰陽無曲徇節氣不相饒師云天童道一段真風見也麼為復世尊升座處是一段真風天童舉頌處是一段真風萬松請益處是一段真風恁麼則却成三段了也如何是一段真風況諸人各各有分也好參詳又道綿綿化母理機梭化母化工造物之別號儒道二教宗於一氣佛家者流本乎一心圭峯道元氣亦由心之所造皆阿賴耶識相分所攝萬松道此曹洞正宗祖佛命脈機紐銜於樞口轉處幽微綿絲吐於梭腸用時綿密何得與邪因無因同日而語哉向下頌世尊蘊藉將來道織成古錦含春象雖是如蟲禦木偶爾成文其奈閉門造車出門合轍末後文殊與折倒却道無奈東君漏泄何文殊白槌世尊便下座及至迦葉白槌便現百千萬箇文殊一等是恁麼時節為甚麼收放不同爾道那箇是東君漏泄處殷勤為解丁香結放出枝頭自在春第二則達磨廓然示衆云卞和三獻未免遭刑夜光投人鮮不按劍卒客無卒主宜假不宜真差珍異寶用不著死貓兒頭拈出看舉梁武帝問達磨大師清旦起來不曾利市如何是聖諦第一義且向第二頭問磨云廓然無聖劈腹剜心帝云對朕者誰鼻孔裏認牙磨云不識腦後見腮帝不契方木不入圓竅遂渡江至少林面壁九年家無滯貨不富師云般若多羅嘗囑達磨大師曰吾滅後六十七載當往震旦設大法藥直指上根慎勿速行衰於日下又汝到時南方勿住彼唯好有為功德不見佛理汝縱到彼不可久留果有遊梁涉魏鈍滯九年之事近代磁州衣法付人山山曰某甲不是恁麼人州曰不是恁麼人自不殃及伊山以法乳情深俯仰而受州復曰汝既如是第一不得容易出世若躁進輕脫中間必有轗軻此與多羅三囑達磨九年彼此一時也霅溪頌云不惜過秋霜圖教滋味長縱然生摘得終是不馨香可以為來者之誡若是本色道人出處自知時節武帝雖不契置箇問端不妨劂剞至今諸方開堂白槌尚云法筵龍象衆當觀第一義只如第一義諦還許觀麼還許武帝達磨問答麼萬松道第一義且置爾要聖諦作麼天皇道但盡凡情別無聖解楞嚴道若作聖解即受群邪只這達磨道廓然無聖石火電光中不妨手親眼辦武帝頑涎不退更問對朕者誰於他梁王分上也是好心殊不知達磨分上劈面被唾相似不免更奉箇不識早是花嬌易謝那堪雪上加霜達磨見伊眼目定動即時轉身別行一路古人或出或處或默或語皆為佛事後來武帝果然過後思君子自撰碑文云見之不見逢之不逢今之古之悔之恨之朕雖一介凡夫敢師之於後自武帝蒙塵之後達磨西歸以來第一義諦無人舉著賴有天童為衆拈出頌云廓然無聖一回飲水一回著噎來機徑庭面赤不如語直得非犯鼻而揮斤好手手中誇好手失不回頭而墮甑已往不咎寥寥冷坐少林老不歇心默默全提正令猶自説兵機秋清月轉霜輪高著眼看河淡斗垂夜柄誰敢承攬繩繩衣鉢付兒孫莫妄想從此人天成藥病天行已過使者須知師云廓然無聖來機徑庭此語本出莊子大有徑庭不近人情初祖當時也少些子方便殊不知藥不瞑眩厥疾弗瘳起初便下霹靂手而今已早私徇姑息所以得非犯鼻而揮斤莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠石斫之匠石運斤成風聽而斫之瞑目恣手盡堊而鼻不傷郢人立不失容自夫子之死也吾無以為質矣失不回頭而墮甑後漢孟敏客居太原曾荷甑墮地不顧而去郭林宗見而問其意對曰甑已破矣視之何益林宗以此異之因勸令遊學意謂武帝若自肯達磨未嘗屈己從人梁王若不契拂袖便行而無恨黃金殿上放沒面目道得一半少林九年口挂壁上始是八成如秋清月轉霜輪暗用法眼到頭霜夜月任運落前溪發明理極無喻之道河淡斗垂夜柄天童上堂云一點環中照極微智無功處却存知緣思淨盡無餘事半夜星河斗柄垂此兩句如啞人作通事指似向人吐露不出那堪師資傳授藥病相治轉沒交涉如何得全提正令去空花幾費龜毛線石女空拈𦿆針咄第三則東印請祖示衆云劫前未兆之機烏龜向火教外別傳一句碓嘴生花且道還有受持讀誦分也無舉東印土國王請二十七祖般若多羅齊往往償口債去也王問曰何不看經無功受祿寢食不安祖云貧道入息不居陰界出息不涉衆緣常轉如是經百千萬億卷上來講讚無限勝因師云二十七祖初名瓔珞童子因二十六祖不如蜜多與東印土堅固王同輦問童子曰能憶往事否對曰我憶往劫與師同居師演摩訶般若我持甚深修多羅以相代正化故俟師於此祖告王曰此非小聖大勢至之應身也王命登輦至宮供養以至披削祖取般若修多羅事命名般若多羅梁朝以達磨為觀音西國以祖師為勢至唯阿彌陀佛至今無下落良久云豐干饒舌後因皇家展會尊者主席這老漢顯異惑衆當時好與掀倒打斷葛藤直待問尊者何不看經果然放不過這老漢也無大人相把葫蘆馬杓翻騰一上王便禮拜識甚痛癢萬松道國王貪他一粒米尊者失却萬年糧只知鐵脊撑天不覺腦門著地若要扶起除是天童頌云雲犀玩月璨含輝暗通一線文彩已彰木馬遊春駿不羈百花叢裏過一葉不沾身眉底一雙寒碧眼不曾趁蛇蜉隊看經那到透牛皮過也明白心起曠劫威音前一箭英雄力破重圍射透兩重關妙圓樞口轉靈機何曾動著寒山忘却來時路暫時不住如同死人拾得相將携手歸須是當鄉人師云破題兩句頌不居陰界不涉衆緣已了且藏教法數五陰十二處十八界喚作三科尊者略舉首尾攝其中間梵語安那般那譯云出息入息其法有六一數二隨三止四觀五還六淨具如天台止觀預備不虞者不可不知溈山警策道教理未嘗措懷玄道無因契悟寶藏論可憐無價之寶隱在陰入之坑何時得靈光獨耀逈脫根塵去天童雲犀玩月燦含輝古詩有犀因玩月紋生角好言語可惜折合向文才情思上木馬遊春駿不羈此頌出息不涉衆緣可謂善行無轍迹也眉底一雙寒碧眼洛浦道單明自己法眼未明此人只具一隻眼若要雙眼圓明除是不居陰界不涉衆緣無影林中高懸日月不萌枝上暗辨春秋始得看經那到透牛皮長慶云眼有何過楞嚴經云汝今諦觀此會聖衆用目循歷其目周視但如鏡中無別分析這裏蹉過藥山道底牛皮也須穿透萬松道却具金剛眼明白心超曠劫三祖道但不憎愛洞然明白一念萬年受持不盡鹿門道遍大地是學人一卷經盡乾坤是學人一隻眼以這箇眼讀如是經千萬億劫常無間斷萬松道看讀不易英雄力破重圍後漢王莽遣弟王尋王邑至昆陽圍光武數十重光武兵弱而欲降尋邑邑不肯光武乃益堅諸將出兵却戰尋邑大敗尊者文武雙全出將入相陰界衆緣非但重圍也妙圓樞口轉靈機爾雅樞謂之椳郭璞注云門扉樞也流水不腐中樞不蠧言其活也尊者未點先行不撥自轉這邊那邊無可不可天童披沙揀金分星擘兩花判了也末後兩句更有餘才道寒山忘却來時路拾得相將携手歸此頌國筵海衆鑽紙穿窗尊者老婆略與鉤簾歸乳燕穴紙出癡蠅用寒山詩若合符節詩云欲得安身處寒山可長保微風吹幽松近聽聲愈好下有斑白人嘮嘮讀黃老十年歸不得忘却來時道閭丘胤訪後與拾得相携出松門更不還寺有本云喃喃讀黃老此頌弱喪忘歸與迷人指路也後唐莊宗皇帝請華嚴休靜禪師入內齋大師大德總看經唯師一衆默然帝問何不看經靜曰道泰不傳天子令時清休唱太平歌帝曰師一人不看即得徒衆何亦不看靜曰獅子窟中無異獸象王行處絶狐蹤帝曰大師大德為甚麼總看靜曰水母元無眼求食須賴蝦帝大悅況祖師尊者從遠劫來號大勢至誦甚深修多羅因此從師名般若多羅元來習氣也不除輸他華嚴却有衲僧巴鼻萬松到此不覺失笑且道笑箇什麼雲居羅漢披襟處鞏縣茶瓶接嘴時第四則世尊指地示衆云一塵才舉大地全收匹馬單槍開疆展土便可隨處作主遇緣即宗底是甚麼人舉世尊與衆行次隨他腳跟轉以手指地云此處宜建梵剎太歲頭上不合動土帝釋將一莖草插於地上云建梵剎已竟修造不易世尊微笑賞罰分明師云世尊因布髮掩泥獻花於然燈佛佛指布髮處云此一方地宜建一剎時有賢首長者插標於指處云建剎已竟諸天散花讚歎庶子有大智矣天童舉話大同小異萬松道世尊祖業轉典與然燈便有長者承頭收後如今交付與天童須要出箇合同文契頌云百草頭上無邊春夾山猶在信手拈來用得親入荒田不揀丈六金身功德聚不審等間携手入紅塵逢場作戲塵中能作主一朝權在手化外自來賓看取令行時觸處生涯隨分足不從人得未嫌伎倆不如人面無慚色師云天童先以四句頌公案了然後鋪舒梗概展演化風趙州拈一莖草作丈六金身用世尊當風指出帝釋信手拈來天童人境交加頌出非但古聖爾即今塵中作得主化外亦來賓且道風流劉駙馬起此報恩院與帝釋插草同別師竪起拂子云千年常住一朝僧第五則清源米價示衆云闍提割肉供親不入孝子傳調達推山壓佛豈怕忽雷鳴過得荊棘林斫倒栴檀樹直待年窮歲盡依舊盂春猶寒佛法身在甚麼處也舉僧問清源如何是佛法大意小官多念律源云盧陵米作麼價老將不論兵師云吉州清源山行思禪師初參六祖便問當何所務即得不落階級祖云汝曾作甚麼來源云聖諦亦不為祖云落何階級源云聖諦尚不為何階級之有祖深器之會下學徒雖衆師居首焉亦猶二祖不言少林謂之得髓矣據這僧問佛法大意也是本色乍入叢林底人要隨文殊遊鐵圍山清源是聖諦亦不為底人却只作尋常相見顧問道盧陵米作麼價有者道盧陵米價不許商量殊不知已入斛斗行鋪了也要得不入這保社問取天童頌云太平治業無象旄頭星現也未野老家風至淳爭如我這裏種田博飯喫只管村歌社飲窮鬼子快活不徹也那知舜德堯仁始成忠孝師云唐文宗太和六年時牛僧孺為相上曰天下何時太平孺對曰太平無象今四夷不致交侵百姓不致離散雖非至治亦謂小康陛下若別求太平非臣所及退而纍表請罷出為淮南節度使萬松道已是起模畫樣所以野老家風擊壤謳歌禮樂文章翻成特地盧陵米價可曬深玄舜德堯仁淳風自化村歌社飲得其所哉月白風清各安其分還會麼逐便歸堂第六則馬祖白黑示衆云開口不得時無舌人解語擡腳不起處無足人解行若也落他彀中死在句下豈有自由分四山相逼時如何透脫舉僧問馬大師離四句絶百非請師直指某甲西來意若識這僧問頭省人多少心力大師云我今日勞倦不能為汝説已有船中月問取智藏去更添帆上風僧問藏却受人處分藏云何不問和尚好本多同僧云和尚教來問可曬靈利藏云我今日頭痛不能為汝説問取海兄去我不可作馬師弟子不得也僧問海苦瓠連根苦海云我到這裏却不會甜瓜徹蒂甜僧舉似大師索取草鞋錢大師云藏頭白海頭黑更參三十年師云六祖謂讓和尚曰西天二十七祖讖汝足下出一馬駒踏殺天下人病在汝心不須速説後磨磚打牛神駒入廄號為馬祖牛行虎視引舌過鼻足下有輪文法嗣一百三十九人各為一方法主智藏海兄乃西堂百丈也看來這僧也是箇學佛法人將四句百非勘當教外別傳宗旨攝大乘論説有是增益謗無是損減謗亦有亦無相違謗非有非無戲論謗四句若離百非自絶黃蘗道欲要直捷會一切總不是萬松道端的委細會一切無不是翻覆看來不離四句不絶百非西來祖意於何不明龍樹大師道般若如大火聚四面不可入却道般若如清涼池四面皆可入這僧道離四句絶百非請師直指西來意諸方謂之鎖口問馬祖不忙只道我今日勞倦不能為汝説問取智藏去惜得自己眉毛穿却那僧鼻孔那僧不免被他驅使真箇去問智藏亦不謀而合道何不問和尚這僧不開眉眼道和尚教來問藏云我今日頭痛不能為汝説問取海兄去可謂非父不生其子也僧問海海云我到這裏却不會將謂侯白更有侯黑這僧雖無血性却有首尾還來舉似馬祖祖云藏頭白海頭黑這句疑殺天下人東林照覺頌云百非四句絶無言黑白分明定正偏萬松道暮四朝三妄生喜怒一日三人與南泉玩月次祖云正當恁麼時如何丈云正好修行藏云正好供養南泉拂袖便行祖云經入藏禪歸海唯有普願獨超物外這裏却宜緇素分明萬松道藏頭白海頭黑鴨頭緑鶴頭赤十影神駒立海南五色祥麟步天北諸方且莫假狐靈天童自有真消息頌云藥之作病胡人飲乳返怪良醫鑒乎前聖師多脈亂病之作醫以藥下藥以毒去毒必也其誰莫是天童麼白頭黑頭兮克家之子一窰燒就有句無句兮截流之機更使溈山笑轉新堂堂坐斷舌頭路一死不再活應笑毗耶老古錐只得一橛師云四句為四謗如大火聚四面不可入四句為四門如清涼池四面皆可入萬松昔年在大明作書記時潭柘亨和尚過大明昏夜扣門告侍者燒香結緣潭柘便放相見萬松請益如何是活句如何是死句柘云書記若會死句也是活句若不會活句也是死句當時自念老作家手段終別今日看這僧問矴矴要離四句百非之外別指出祖意三箇老漢頭腦相似若便作離四句絶百非會好與這僧一坑埋却後來天童頌仰山夢中白槌道離四句絶百非馬師父子病休醫萬松道是何心行白頭黑頭兮克家之子周易蒙卦九二子克家能荷家業也有句無句兮截流之機萬松道只有湛水之波且無滔天之浪堂堂坐斷舌頭路應笑毗耶老古錐梵語毗耶離譯云廣嚴維摩所居城名文殊問不二法門維摩默然這僧問馬師父子葛藤遍地且道那裏是應笑處但能莫觸當今諱也勝前朝斷舌才第七則藥山升座示衆云眼耳鼻舌各有一能眉毛在上士農工商各歸一務拙者常間本分宗師如何施設舉藥山久不升座動不如靜院主白云大衆久思示誨請和尚為衆説法便重不便輕山令打鐘衆方集聚頭作相那事悠悠山升座良久便下座歸方丈一場話主隨後問和尚適來許為衆説法云何不垂一言大海若知足百川應倒流山云經有經師論有論師爭怪得老僧可惜龍頭蛇尾師云飢者易為食渴者易為飲是以三家五請菩薩上堂半偈全身夜叉升座豈悕法哉黃龍南禪師云蓋今之人容易輕法者衆欲如田夫時時乾之令其枯渴然後溉灌方得秀實也藥山久不升座又且不然覺範道一菴深藏霹靂舌從教萬象自分説永嘉道默時説説時默大施門開無壅塞院主頭頭蹉過白云大衆久思示誨請和尚為衆説法仁義道中主賓分上也未為分外山令打鐘只見雷霆施號令衆方集豈知星斗煥文章山升座良久下座歸方丈一上神通不同小小主隨後問云和尚適來許為衆説法云何不垂一言翠巖芝云藥山下座院主當初怪不為衆説法可謂誤他三軍萬松道正是將頭不猛山云經有經師論有論師爭怪得老僧琅琊覺云藥山下座不妨疑著及乎院主拶著失却一隻眼萬松道再得完全能幾箇而不知換得兩隻眼雪竇道可惜藥山老漢平地喫交盡大地人扶不起萬松道和尚也須出隻手無餘頌云丈室未離已喫交悄然歸去轉無憀經師論師猶相告一欵分明便自招萬松道曹司易勘公案未圓解與天童如何判斷頌云癡兒刻意止啼錢堪作何用良駟追風顧影鞭踢起便行雲掃長空巢月鶴樹下底一場懡㦬寒清入骨不成眠開眼作夢師云涅盤經説嬰兒啼時母將黃葉云與汝金兒即止啼此頌久思示誨與云何不垂一言外道問佛不問有言不問無言世尊良久外道便作禮云世尊大慈開我迷雲令我得入外道去後阿難問佛外道見何道理而言得入佛言如世良馬見鞭影而行藥山與世尊一等舉鞭院主率衆僧禮讚有分却怪不垂一言可謂東土衲僧不如西天外道天童恁麼頌萬松恁麼説盡是止啼黃葉只為諸人熱夢未醒睡輕者一呼便覺睡重者搖撼方驚更有一等椓抄起來猶自寱瞪比他藥山睛巢月鶴清不成眠雲泥有隔雖然如是睡語不少第八則百丈野狐示衆云記箇元字腳在心入地獄如箭射一點野狐涎咽下三十年吐不出不是西天令嚴只為呆郎業重曾有誤犯者麼舉百丈上堂常有一老人聽法隨衆散去閙中取靜一日不去從來疑著這漢丈乃問立者何人事不解交客來須待老人云某甲於過去迦葉佛時曾住此山元是當家人有學人問大修行底人還落因果也無但行好事莫問前程對他道不落因果一句合頭語萬劫繫驢橛墮野狐身五百生爾道不落因果今請和尚代一轉語著甚來由丈云不昧因果一坑埋却老人於言下大悟狐涎猶在師云洪州百丈山大智禪師每至升座常有一老人聽法迦葉佛時曾住此山錯對學人一轉語至今墮野狐身良由自己倚牆貼壁送人墮坑落塹見大智有抽釘拔楔手段便舍已從他請大智代一轉語大智施無畏辨輕輕撥轉道不昧因果老人言下大悟據實而論不落因果是撥無斷見不昧因果是隨流得妙稍解教乘者舉著便見要且雖脫毛衣猶披鱗甲不見道圓禪師在南禪師會中聞二僧舉此話一僧曰只如不昧因果也未脫得野狐身一僧應聲曰便是不落因果亦何曾墮野狐身耶師悚然異其語急上黃蘗積翠菴頭過澗忽大悟見南公敘其事未終涕交頤南公令就侍者榻熱𥧌忽起作偈曰不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖栗任縱橫野狐跳入金毛隊南公大笑恁麼看來當初見道今請和尚代一轉語只樂道不落因果免使初心墮在解穽百丈至晚上堂舉前因緣黃蘗便問古人錯答一轉語墮五百生野狐身轉轉不錯合作甚麼丈云近前與爾道蘗近前與丈一掌丈拍手笑云將謂狐須赤更有赤須狐仰山道百丈得大機黃蘗得大用名不虛得溈山舉問仰山黃蘗常用此機為復天生得從人得仰云亦是稟受師承亦是自性宗通溈云如是如是看他百丈父子遊行無畏如師子王豈向野狐窠裏作活計萬松已是尾骨彌露更放天童弄爪牙看頌云一尺水一丈波幸自河清海晏五百生前不奈何早知今日事悔不慎當初不落不昧商量也頑涎不斷依前撞入葛藤窠纏腰繳腳阿呵呵堪笑堪悲會也麼按牛頭喫草若是爾灑灑落落如蟲禦木不妨我哆哆和和偶爾成文神歌社舞自成曲拍拍是令拍手其間唱哩囉細末將來師云立修證分因果一尺水一丈波墮在五百生野狐精魅積翠庵下二僧縱有逸群之辨點檢將來未免撞入葛藤窠裏天童此句有兩字未穩何不道依前撞入野狐窠阿呵呵此頌明百丈悟處露自己胸襟道會也麼但問天童會也未若是爾灑灑落落不妨我哆哆和和幸有一陰地何勞不為人哆哆和和嬰兒言語不真貌又法華釋籤云多跢學行之相嘙和習語之聲涅盤經有病行嬰兒行有本云婆婆和和石室善道禪師云涅盤十六行中嬰兒行為最哆哆和和時喻學道人離分別取捨心與下神歌社舞皆一意也且道是何曲調萬籟有心聞不得孤巖無耳却知音第九則南泉斬貓示衆云踢翻滄海大地塵飛喝散白雲虛空粉碎嚴行正令猶是半提大用全彰如何施設舉南泉一日東西兩堂爭貓兒人平不語水平不流南泉見遂提起云道得即不斬誰敢當鋒衆無對直待雨淋頭泉斬却貓兒為兩段抽刀不入鞘泉復舉前話問趙州再來不直半文州便脫草鞋於頭上戴出好與一刀兩段泉云子若在恰救得貓兒心斜不覺口喝師云法雲圓通秀禪師見二僧並立説話將拄杖到連卓數下云一片業地何況兩堂衆首因貓致諍南泉也不與解勸亦不與懲罰本色道人以本分事為人遂提起貓兒云道得即不斬正當恁麼時盡十方界有情無情一齊向南泉手中乞命當時有箇出來展開兩手不然攔胸抱住云却勞和尚神用縱南泉別行正令敢保救得貓兒這一窟死老鼠既無些子氣息南泉已展不縮盡令而行遼朝上人𭣪作鏡心録訶南泉輩殺生造罪文首座作無盡燈辨誤救云古本以手作虛斫勢豈直一刀兩段鮮血淋迸哉這兩箇批判古人文公罪重𭣪公罪輕南泉依舊水牯牛隊裡搖頭擺尾不見佛日禪師與衆茶座次見貓來袖中擲鵓鴿與之貓接得便去日云俊哉不可也是假作虛用南泉自念曲高和寡舉前話問趙州州便脫草鞋於頭上戴出果然敲唱俱行節拍成就泉云子若在恰救得貓兒這些子用處雖難會却易見爾但向拈匙舉筯處覷破便見斬貓兒戴草鞋更無兩樣不然更看天童別作甚麼伎倆頌云兩堂雲水盡紛拏有理不在高聲王老師能驗正邪明鏡當臺物來斯鑑利刀斬斷俱亡像消得龍王多少風千古令人愛作家有一人不肯此道未喪死貓兒頭堪作何用知音可嘉不道無只是少鑿山透海兮唯尊大禹功不浪施鍊石補天兮獨賢女媧闕一不可趙州老有生涯信手拈來無不是草鞋頭戴較些些且信一半異中來也還明鑒衲子難謾只箇真金不混沙是真難滅師云兩堂雲水盡紛拏至今不曾定交若非天童會南泉例驗出端倪往往邪正不分邪正分明時如何判斷便好利劍斬斷一坑埋却非但勦絶一期不了公案亦使千古之下風清寰宇南泉當時師勝資強見衆無語却舉似趙州表顯衆中有人趙州脫草鞋頭上戴出果然此道未喪知音可嘉孔子云天將未喪斯文也看他師資道合唱拍相隨無以為喻諡法泉源流通曰禹又受禪成功曰禹尚書禹貢導河積石至於龍門淮南子共工氏兵強凶暴而與堯帝爭功力窮觸不周山而死天柱為之折女媧鍊五色石補天列子陰陽失度名缺鍊五常之精名補雲蓋本拈洞山掇却泰首座果棹話云洞山雖有打破虛空底鉆鎚要且無補綴底針線南泉如大禹鑿山透海顯出神用趙州如女媧鍊石補天圓却話頭萬松道趙州十八上解破家散宅不知有多少生涯草鞋頭戴較些些咄咄沒去處作這箇去就保福展云雖然如是也只是破草鞋南泉平高就下道子若在恰救得貓兒翠巖芝云大小趙州只可自救放過一著天童道異中來也還明鑒只箇真金不混沙只能順水推船不解逆風把柁而今爾這一隊上來貓又無爭甚狗以拄杖趁下第十則臺山婆子示衆云有收有放干木隨身能殺能活權衝在手塵勞魔外盡付指呼大地山河皆成戲具且道是甚麼境界舉臺山路上有一婆子傍城莊家夾道兔凡有僧問臺山路向什麼處去一生行腳去處也不知婆云驀直去未當好心僧才行著賊也不知婆云好箇阿師又恁麼去也爾早侯白僧舉似趙州人平不語州云待與勘過水平不流州亦如前問陷虎之機至來日上堂云我為汝勘破婆子了也我更侯黑師云臺山路上婆子慣隨無著出寺入寺飽參文殊前三後三凡見僧問臺山路向什麼處去便當陽指出長安大道云驀直去其僧不作疑阻便行婆云好箇阿師又恁麼去也這婆子也鉤錐在手從來觸誤多少賢良這僧既不奈伊何拈來舉似趙州州云待與勘過疑殺天下人這老漢老不歇心圖箇甚麼也要定箇宗眼州依前恁麼問婆依前恁麼答有底便話作兩橛前段點這僧扶婆子後段點婆子扶趙州唯玄覺云前僧也恁麼問答後來趙州也恁麼問答且道甚處是勘破處萬松道勘破了也又云非唯被趙州勘破赤被這僧勘破萬松道非但纍及玄覺亦乃纍及萬松琅琊云大小趙州去這婆子手裡喪身失命雖然如是錯會者多萬松道切忌以已方人溈山哲云天下衲僧只知問路老婆要且不知腳下泥深若非趙州老人爭顯汗馬功高雖然須假天童歌揚始得頌云年老成精不謬傳切忌魔魅人家男女趙州古佛嗣南泉鎮州端的出大蘿蔔枯龜喪命因圖象靈鬼靈神返遭羅網良駟追風纍纏牽驟風驟雨不免韁勘破了老婆禪幾箇男兒是丈夫説向人前不直錢知根不聖師云鬼魅以妖通成精呪藥以依通成精天龍以報通成精賢聖以神通成精佛祖以道通成精南泉趙州乃佛祖向上人那堪年老所以道年老成精也趙州古佛嗣南泉馬祖道經入藏禪歸海唯有南泉獨超物外趙州以長沙為友以南泉為師故勘辨中非得失勝負之可品格天下謂之趙州關也不妨難過雖然仲尼有言神龜能現夢於元君而不能免余且之網智能七十二鑽而無遺策而不能避刳腸之患如是則智有所困神有所不及也莊子云宋元君夢人被髮曰豫自宰路之淵豫為清江使河伯之所漁者余且得豫覺占之神龜也漁者果有余且網得白龜其圓五尺君欲活之卜之曰殺龜以卜吉乃刳龜七十二鑽而無遺策乃其事也洛浦曰欲知上流之士不將佛祖言教貼在額頭如龜負圖自取喪身之兆鳳縈金網趨霄漢以何期周穆王八駿有乘雲而趨行越飛鳥者故曰良駟追風也此頌婆子能勘僧而不免趙州勘破趙州雖能勘婆而不免琅琊點檢參禪謂之金屎法不會如金勘破如屎所以道説向人前不直錢汝但離却得失勝負情量自然平欺婆子下視趙州若到萬松門下不得點胸簷板第十一則雲門兩病示衆云無身人患疾無手人合藥無口人服食無受人安樂且道膏肓之疾如何調理舉雲門大師云光不透脫有兩般病還覺口乾舌縮麼一切處不明面前有物是一白日見鬼莫是眼花透得一切法空隱隱地似有箇物相似亦是光不透脫早是結胸那堪喉閉又法身亦有兩般病禍不單行得到法身為法執不忘已見猶存墮在法身邊是一不唯邪祟更有家親直饒透得放過即不可養病喪軀子細點檢將來有甚麼氣息亦是病醫博未離門又早癇病發師云越州乾峯和尚法嗣洞山悟本雲門遍參曾見師與曹山疏山此則公案先有來源乾峯示衆云法身有三種病二種光須是一一透得更須知有向上一竅雲門出衆云只如庵內人為甚不知庵外事峯呵呵大笑門云猶是學人疑處峯云子是甚麼心行門云也要和尚相委悉峯云直須恁麼始得穩坐地門云喏喏乾峯道法身有三種病雲門道法身有兩種病萬松行腳時諸方商量道未到走作已到住著透脫無依是三種病今言二種少未到走作後二種病顯然大同佛眼和尚道騎驢覓驢是一騎驢了不肯下亦是病乃前二病少後一種師家一期應病施方各垂方便其二種光與光不透脫有兩般病無別且一切處不明面前有物是一者洞山道分明覿面別無真爭奈迷頭還認影若具把定乾坤眼綿綿不漏絲毫方得少分相應又道透得一切法空隱隱地似有箇物相似亦是光不透脫溈山所謂無一法可當情見猶在境楞嚴經云縱滅一切見聞覺知內守幽間猶為法塵分別影事南院顒道我當時如燈影裏行相似所以道亦是光不透脫洞上宗風靜沈死水動落今時名二種病爾但出不隨應入不居空外不尋枝內不住定自然三病二光一時透脫然後透脫不透脫拈放一邊子細點檢將來有甚麼氣息亦是病如何得安樂去更請天童診候頌云森羅萬象許崢嶸聽他何礙汝識得不為冤透脫無方礙眼睛閃捧著榾桗掃彼門庭誰有力拂迹成痕欲隱彌露隱人胸次自成情心疑生暗鬼船橫野渡涵秋碧死水浸却棹入蘆花照雪明住岸却迷人串錦老漁懷就市著本圖利飄飄一葉浪頭行隨流得妙師舉法句經云森羅及萬象一法之所印一即萬萬即一即此物非他物一任崢嶸磊落荒田不揀草淨地却迷人直饒透脫無方正是礙眼睛處圓覺經道於諸妄心亦不息滅洞山道靈苗瑞草野父愁耘何必掃彼門庭空一切法雲門道一切處不明面前有物是一不是教爾除幻境滅幻心別覓透脫處三祖道六塵不惡還同正覺與圓覺經知幻即離不作方便離幻即覺亦無漸次便見作止任滅如金剛與泥人揩背也又道隱人胸次自成情此頌隱隱地似有箇物相似正是圓覺存我覺我潛續如命細四相病故普覺云大悲世尊快説禪病船橫野渡涵秋碧此頌得到法身纜船於澄源湛水疏山以法身為枯樁此真繫驢橛也直待撥轉船子未免棹入蘆花照雪明處到此清光照眼似迷家明白轉身還墮位此頌直饒透得放過即不可到此雲門道盡天童頌徹也然後要見雲門意旨天童眼目這裏便是計利害處如何是雲門意旨不見道子細點檢將來有什麼氣息亦是病雲門但指其病不説治法如何是天童眼目述雲門治方云串錦老漁懷就市飄飄一葉浪頭行雲門大意在入垂手不避風波可謂自病既除復愍他疾淨名之心也還知麼病多諳藥性得效敢傳方第十二則地藏種田示衆云才士筆耕辨士舌耕我衲僧家慵看露地白牛不顧無根瑞草如何度日舉地藏問修山主甚處來道不知來處得麼修云南方來好與下載藏云南方近日佛法如何行説好話修云商量浩浩地低聲藏云爭如我這裏種田博飯喫少賣弄修云爭奈三界何猶有這箇在藏云爾喚甚麼作三界南方猶可北方更曬師云漳州羅漢院桂琛禪師漳州牧王公於閩城西石山建地藏院請師住逾紀遷漳州羅漢故師又名地藏修山主法眼悟空進山主結友之湖外至漳州阻雨雪溪漲寓城西地藏院圍爐視地藏若無人藏欲驗之亦附火乃曰有事相借問得否修曰有事請問藏曰山河大地與諸尚座是同是別修曰是別藏竪兩指修急曰是同是同藏亦竪兩指起去法眼曰院主竪兩指其意如何修曰亂與眼曰不得麁心欺他修曰鼠口豈有象牙次日辭行前至宿處眼曰兄輩前去吾依地藏或有長處無則復來相尋眼既久參修等三人亦至地藏遂問南方佛法近日如何當時只好道與此方常日一般却云商量浩浩地自領出頭也不知藏云爭如我這裏種田博飯喫當時便好道恁麼則非但南方也更道爭奈三界何帶纍他南方禪客俗氣也不除藏為慈悲之故有落草之談道爾喚甚麼作三界不如只道箇老僧種田事忙免得天童一狀領過頌云宗説般般盡強為今日不著便流傳耳口便支離衆僧莫怪種田博飯家常事不可別有不是飽參人不知要知作麼參飽明知無所求更須請益天童一遍子房終不貴封侯也是靈龜曳尾忘機歸去同魚鳥隨流得妙濯足滄浪煙木秋受用不盡師云清涼道宗通自修行説通示未悟本出楞伽經佛告大慧有二種通宗通者為緣自得勝進相遠離言説文字妄想趣無漏界緣自覺趣光明輝發是名宗通相云何説通相謂説九部種種教法離異不異有無等相以巧方便如應説法是名説通相講徒云説通宗不通如日被雲籠宗通説不通如蛇入竹筒宗通説亦通如日處虛空宗説俱不通如犬吠茅叢既分宗説已是兩岐那堪禪分五派教列三乘箇中一亦不立皆強為也何況出口入耳請益拈頌葛藤引蔓過新羅鞏縣茶瓶湯不絶非但南方商量浩浩地若是道火不燒口底人辨似懸河元無一字種田博飯雖是家常其奈不是飽參不知其趣古人深山裏钁頭邊折腳鐺中煮脫粟飯富不過知足一世不求人貴不過清間何須印如斗所以道參飽明知無所求子房終不貴封侯史記漢六年封功臣或謂張良未嘗有戰鬪功高帝曰運籌帷幄之中決勝千里之外子房功也使自擇齊三萬戶良曰始臣下邳與上會留此天以臣授陛下用臣計而幸時中臣願封留足矣不敢當三萬戶此頌不必開堂演法斆南方也離騷經漁父歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足此乃猿鶴共處魚鳥同遊且道是甚麼人本色簷板漢第十三臨際瞎驢示衆云一向為人不知有己直須盡法不管無民須是拗折木枕惡手腳臨行之際合作麼生舉臨際將示滅囑三聖老婆臨死三回別吾遷化後不得滅却吾正法眼藏著甚死急聖云爭敢滅却和尚正法眼藏佯小心故大膽際云忽有人問汝作麼生對虎口裏橫身聖便喝當機不讓父際云誰知吾正法眼藏向這瞎驢邊滅却重賞之下必有勇夫師云臨際囑三聖不得滅却吾正法眼藏此與興化謂克賓維那汝不久為唱道之師罰饡飯出院機用一般其實此事千佛出世不增千聖入滅不減豈一三聖能興滅哉古人臨終顯發此事亦表衆中有人果然三聖出云爭敢滅却和尚正法眼藏如人被罵不甘者承頭當時便與本分草料正法眼藏未到滅却却道忽有人問汝作麼生對當斷不斷返招其亂聖便喝上代下世門裏出身耳聾三日以來不似而今這喝際云誰知吾正法眼藏向這瞎驢邊滅却當時臨際門風自有正令可惜放過不知天童如何判斷頌云信衣半夜付盧能賊兒賊智攪攪黃梅七百僧上梁不正臨際一枝正法眼半明半暗全在今朝瞎驢滅却得人憎心甜口苦心心相印販私鹽漢祖祖傳燈鑿壁偷光夷平海嶽拳倒黃鶴樓踢翻鸚鵡洲變化鵾鵬翻手是雲覆手是雨只箇名言難比擬猶嫌少在大都手段解翻騰正法眼藏猶在師云黃梅密付二十年南北紛爭臨際明傳至今有人不薦這般手段直得鯤鵬變化海嶽夷平大溈秀云古者忍死待來因何正法眼藏却向瞎驢邊滅却臨際行計速速三聖又却匆匆因斯父子情忘遂使後人失望若不得流水還應過別山本録三聖便禮拜未當好心臨際乃付偈曰沿流不止問如何真照無邊説似他離相離名人不稟吹毛用了急須磨偈畢儼然而逝此公案天童拈到恰好處便休三聖禮拜臨際説偈大有放過輕捨處還有與古人出氣底麼險第十四則廓侍過茶示衆云探竿在手影草隨身有時鐵裹綿團有時錦包特石以剛決柔則故是逢強即弱事如何舉廓侍者問德山從上諸聖向什麼處去也在儞鼻孔裏山云作麼作麼迅雷不及掩耳廓云敕點飛龍馬跛鱉出頭來家富兒嬌山便休去饒人不是癡來日山浴出廓過茶與山山撫廓背一下斷送上竿頭廓云這老漢方始瞥地覆車同轍山又休去虎頭虎尾一時收師云德山尋常敲風打雨呵佛罵祖這僧過犯彌天為甚却放過殊不知撲牛不用索殺人不用刀幾曾放過來老黃龍道德山持聾作啞雖然暗得便宜廓公掩耳偷鈴爭奈傍觀者醜萬松道豈止偷鈴如九重淵底驪龍頷下抉珠正值龍睡若覺時必為虀粉大溈哲云若不登龍門焉知滄海寬直饒浪擊千尋爭奈龍王不顧萬松道纖鱗片甲不足為怪佛果道德山直是惡手腳見這僧不是受鉆鎚底人所以便休去萬松道古人遇物臨機各有方便山謂巖頭曰爾已後向老僧頭上屙去在巖頭後來果謂大小德山不會末後句古人抑揚縱奪豈得失勝負可拘黃龍大溈只舉大綱更看天童頌出深細頌云覿面來時作者知昧者不覺可中石火電光遲已過新羅輸機謀主有深意埋兵掉鬪欺敵兵家無遠思深入虜庭發必中慣得其便更謾誰并贓捉獲腦後見腮兮人難觸犯曾經蛇咬眉底著眼兮渠得便宜佯打不知師云從上諸聖向什麼處去也大似當面蹉過德山道作麼作麼德山影草藏身拈出曜眼鏡昔七賢女遊尸多林一女云尸在這裏人在什麼處一女云作麼作麼諸女相顧悉皆悟道感得天帝散花供養德山用此一機借路經過決不得恁麼會所以道可中石火電光遲德山豈不知侍者放伊不過下媒求鴿著本圖利果然出他彀中不得忽有人問萬松甚麼處去也攔腮掌云在這裏直教飛龍跛鱉縮項攢蹄侍者德山亡鋒結舌還識德山老漢麼少年曾決龍蛇陳潦倒還聽稚子歌第十五則仰山插鍬示衆云未語先知謂之默論不明自顯謂之暗機三門前合掌兩廊下行道有箇意度中庭上作舞後門外搖頭又作麼生舉溈山問仰山甚處來不是不知來處仰云田中來儞為甚落草山云田中多少人只父子兩箇仰插下鍬子叉手而立放去較危山云南山大有人刈茆打草驚蛇仰拈鍬子便行收來太速師云師資合道父子投機溈仰家風千古龜鑑溈山問仰山甚處來溈山豈不知仰山田中來垂此一問要與仰山相見仰山不負來問只道箇田中來且道還有佛法道理也無溈山深入虎穴更問田中多少人仰山插鍬子叉手而立便衲僧相見玄沙云我當時若見便與踏倒鍬子萬松道忍俊不禁投子青禪師頌云溈山問處少知音插地酬他佛祖沈踏倒玄沙傍不肯免教蒼翠帶春深萬松道草枯鷹眼疾南嶽法輪平禪師頌云狹路相逢避不及插下鍬時叉手立過得橋來岸上行始覺渾身泥水濕萬松道不堪回首月明中二老宿頌處只有千尺寒松更看天童放出抽條石笋頌云老覺情多念子孫婆心太切而今慚愧起家門三十年不少鹽醋是須記取南山語貴人多忘鏤骨銘肌共報恩恨心不捨師云此頌如韓文毛頴傳理事雙彰真俗並舉一往觀來溈山為老覺仰山以下為子孫就裏即不然僧問長沙岑大蟲本來人還成佛否山云爾道大唐天子還割茅刈草否是知刈茆乃臣子邊事而今慚愧起家門千年無影樹今時沒底靴住持千嶂月衣鉢一溪雲皆是得力兒孫紹承家業是知君臣父子非特曹洞創立溈仰父子已行此令若不是溈山點破一向光影門頭弄粥飯氣驢前馬後以當平生甚為可惜所以天童教記取南山刈茆一轉語鏤骨銘肌報恩不盡法燈云野老負薪歸催婦連宵織看他家事忙且道承誰力問渠渠不知特地生疑惑傷嗟今古人幾箇知恩德知有後如何斷臂不覺痛立雪不敢倦所以萬松老來住報恩院第十六麻谷振錫示衆云指鹿為馬握土成金舌上起風雷眉間藏血刃坐觀成敗立驗死生且道是何三昧舉麻谷持錫到章敬繞禪床三匝振錫一下卓然而立可曬有禪敬云是是且信一半谷又到南泉繞禪床三匝振錫一下卓然而立來朝更獻楚王看泉云不是不是也且信一半谷云章敬道是和尚為什麼道不是棺木裏睜眼泉云章敬即是是汝不是雪上加霜此是風力所轉終成敗壞殺人須見血師云昔日仰山到中邑謝戒邑於禪床上拍手云阿㖿阿㖿仰從西過東從東過西復向中心立然後謝戒邑云甚處得此三昧仰云於曹溪脫印子學來邑云汝道曹溪三昧接甚麼人仰云接一宿覺仰復問和尚甚處得此三昧邑云馬大師處得此三昧蒲州麻谷寶徹禪師恰如永嘉初見六祖持錫到章敬繞禪床三匝振錫一下卓然而立也如曹溪脫印子學來此名三昧王三昧一切三昧皆從此生章敬道是是萬松道有何不可勝默光和尚道是無可是非無真非是非無主萬善同歸梟雞晝夜徒自支離我無三寸鱉得喚龜迦葉不肯一任攢眉萬松道多愁早老麻谷要與諸方勘同麻谷又曾到忠國師處繞禪床三匝振錫而立國師云既能如是何用更見貧道谷又振錫國師云這野狐精出去看他賓主相見有照有用有首有尾良由熟處難忘慣得其便又到南泉繞床振錫依前而立南泉却道不是不是便似曾與章敬廝計會來大溈哲云章敬道是落在麻谷彀中南泉道不是亦落在麻谷彀中大溈即不然忽有人持錫繞禪床三匝卓然而立但向伊道未到這裏好與三十棒萬松道不可口行人事便打谷云章敬道是和尚為什麼道不是不妨疑著泉云章敬即是是汝不是見機而作臨險推人圓通善國師道麻谷即是南泉不是此語正如鄧峯永庵主問僧審奇汝久不見何所為奇曰近見偉藏主有箇安樂處永曰試舉似我奇因敘其所得永曰汝是偉未是奇莫測歸語於偉偉大笑曰汝非永不非也奇走質於積翠南禪師南亦大笑永聞之作偈曰明暗相參殺活機大人境界普賢知同條生不同條死笑倒庵中老古錐覺範云觀其語言想見當時法喜遊戲之逸韻萬松道麻谷章敬南泉此興亦不淺若聞此是風力所轉終成敗壞更是好笑這王老師不唯把定乾坤兼有出身之路保寧勇和尚頌云顏色規模恰似真人前拈弄越光新及乎入火重烹鍊到了終歸是假銀麻谷到此瓦解氷消若要氷河發焰鐵樹花開須得天童別下一轉語頌云是與不是細腰鼓子兩頭打好看棬䙡刺頭在裏許了也似抑似揚手擡手捺難兄難弟頭高頭低縱也彼既臨時翻手是雲奪也我何特地覆手是雨金錫一振太孤標脫塵離俗繩床三繞間遊戲因行掉臂叢林擾擾是非生矮子看戲想像髑髏前見鬼家有白澤之圖必無如是妖怪師云此箇公案全在是與不是處時人盡道麻谷被草敬南泉調弄唯大溈哲道章敬道是也落在麻谷彀中南泉道不是亦落在麻谷彀中如金剛寶處於日中光色無定天童道好看棬䙡且麻谷落棬䙡南泉落棬䙡似抑似揚難兄難弟天童道一往觀來似抑似揚點檢將來難兄難弟東漢陳元方子長文即陳群也與季方子孝光各論其父功德爭之不決咨於太丘太丘即陳實元方季方父也太丘曰元方難為兄季方難為弟此謂章敬左眼半斤南泉右眼八兩金錫一振太孤標永嘉證道經亦云不是標形虛事治如來寶杖親蹤迹雪竇道古策風高十二門門門有路空蕭索錫杖經云十二環者用念十二因緣修行十二門禪十二緣易知十二門四禪四無量四無色定古策風高即太孤標也六祖亦云夫沙門具三千威儀八萬細行大德何方而來生大我慢天童意道不是標形亦非我慢繩床三繞間遊戲章敬道是南泉道不是叢林擾擾是非裏走作若無把定乾坤眼盡是髑髏前見鬼不見僧問九峯如何是把定乾坤眼峯云乾坤在裏許僧云乾坤眼何在峯云正是乾坤眼僧云適來為什麼道乾坤在裏許峯云若不恁麼髑髏前見鬼無數萬松這裏有箇禁師卓拄杖一下云急急如律令
