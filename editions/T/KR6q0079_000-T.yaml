body:
  text: 從容錄重刻四家語錄序自佛祖拈花迦葉微咲雖云默露宗風殊覺渾淪透漏更逢後來好事兒孫不知重惜家寶各各拚身失命平地生塵澄波動浪亂散空華欺搖揑目訛傳眾口公案多端天童雪竇殘唾既苦不收圜悟萬松夢語又多不醒幸得清涼老人久知祖禰不了之殃今日門徒古顏盡將骨董搬出分化四家從新翻刻嗚呼賍私現在真賊難逃敢請寶劍金剛便與一齊砍斷然後將他零碎評詞共四海蒼生作個太平歌唱也南城近溪羅汝芳題丁未中龝長洲沈咸書重刻四家評唱序自夫佛祖拈花迦葉微咲機鋒雲變宗旨淵停蓋教外別傳個中真諦殆非人世語言可形容萬一然開發後學說法利生則此尤易于迎機入悟舊刻四家語錄殺青者不甚工規局隘陋評註拘迫閱者苦之然已如登大寶山入華藏海儘力摸索不恤也帝京禪伯揮麈談宗往往而是近且磨糊莫辨矣講師覺虛發大弘慈欲重命棗人而力不逮謀于予予實有夙願敢不畢力於是鳩工梓其三僧俗同志者梓其一而當日頂針棒喝揚眉竪指之機更自透漏洞朗則覺公之意滿而功德亦無邊予惟無能為役是懼又何思議之有萬曆丁未歲菊月吉旦雲南楚雄府知府華亭徐琳書萬松老人評唱天童覺和尚頌古從容庵錄序昔予在京師時禪伯甚多唯聖安澄公和尚神氣嚴明言辭磊落予獨重之故嘗訪以祖道屢以古昔尊宿語緣中所得者叩之澄公間有許可者予亦自以為得及遭憂患以來功名之心束之高閣求祖道愈亟遂再以前事訪諸聖安聖安翻案不然所見予甚惑焉聖安從容謂予曰昔公位居要地又儒者多不諦信佛書惟搜摘語緣以資談柄故予不敢苦加鉆鎚耳今揣君之心果為本分事以問予予豈得猶襲前愆不為苦口乎予老矣素不通儒不能教子有萬松老人者儒釋兼備宗說精通辯才無礙君可見之予既謁萬松杜絕人迹屏斥家務雖祁寒大暑無日不參焚膏繼晷廢寢忘餐者幾三年誤被法恩謬膺子印以湛然居士從源目之其參學之際機鋒罔測變化無窮巍巍然若萬仞峯莫可攀仰滔滔然若萬頃波莫能涯際瞻之在前忽焉在後迴視平昔所學皆塊礫耳噫登東山而小魯登泰山而小天下者豈虛語哉其未入閫域者聞是語必謂予忘本好異也唯屏山閑閑其相照乎爾後奉命赴行在扈從西征與師相隔不知其幾千里也師平昔法語偈頌皆法兄隆公所收今不復得其吾宗有天童者頌古百篇號為絕唱予堅請萬松評唱是頌開發後學前後九書間關七年方蒙見寄予西域伶仃數載忽受是書如醉而醒如死而甦踴躍歡呼東望稽顙再四披繹撫卷而歎曰萬松來西域矣其片言隻字咸有指歸結欵出眼高冠今古足為萬世之模楷非師範人天權衡造化者孰能與於此哉予與行宮數友旦夕游泳於是書如登大寶山入華藏海互珍奇物廣大悉備左逢而右遇目富而心飫豈可以世間語言形容其萬一耶予不敢獨擅其美思與天下共之京城唯法弟從祥者與僕為忘年交謹致書請刊行于世以貽來者迺序之曰佛祖諸師埋根千丈機緣百則見世生苗天童不合抽枝萬松那堪引蔓湛然向枝蔓上更添芒索穿過尋香逐氣者鼻孔絆倒行玄體妙底脚跟向去若要脚跟點地鼻孔撩天却須向這葛藤裏穿過始得甲申中元日漆水移剌楚才晉卿敘於西域阿里馬城評唱天童從容庵錄寄湛然居士書吾宗有雪竇天童猶孔門之有游夏二師之頌古猶詩壇之李杜世謂雪竇有翰林之才蓋採我華而不摭我實又謂不行萬里地不讀萬卷書毋閱工部詩言其博贍也擬諸天童老師頌古片言隻字皆自佛祖淵源流出學者罔測也柏山大隱集出其事迹間有疎闊不類者至於拈提苟簡但據款而已萬松昔嘗評唱兵革以來廢其祖邇來退居燕京報恩旋築蝸舍榜曰從容庵圖成舊緒適值湛然居士勸請成之老眼昏華多出口占門人筆受其間繁載機緣事迹一則旌天童學海波瀾附會巧便二則省學人檢討之功三則露萬松述而不作非臆斷也竊比佛果碧巖集則篇篇皆有示眾為備竊比圓通覺海錄則句句未嘗支離為完至于著語出眼筆削之際亦臨機不讓壬午歲杪湛然居士書至堅要拈出不免家醜外揚累吾累汝也癸未年上已日萬松野老因風附寄不宣從容庵錄目錄卷一一世尊陞座說法二達磨廓然帝王三東印請祖帝王四世尊指地伽藍五清源米價問法六馬祖白黑祖教七藥山陞座說法八百丈野狐因果九南泉斬猫猫犬十臺山婆子尼女十一雲門兩病法身十二地藏種田田地十三臨際瞎驢遷化十四廓侍過茶十五仰山插鍬田地十六麻谷振錫瓶錫卷二十七法眼毫釐對機十八趙州狗子猫犬十九雲門須彌遊山二十地藏親切悟道二一雲巖掃地搬掃二二巖頭拜喝參學二三魯祖面壁禪定二四雪峯看蛇兔蛇二五鹽官犀扇鏡扇二六仰山指雪獅象二七法眼指簾簾帳二八護國三懡骨董二九風穴鐵牛宰臣三十大隋劫火水火三一雲門露柱佛祖三二仰山心境勘辨卷三三三三聖金鱗龜魚三四風穴一塵示眾三五洛浦伏膺菴居三六馬師不安問疾三七溈山業識勘辨三八臨濟真人人境三九趙州洗鉢齋粥四十雲門白黑對機四一洛浦臨終遷化四二南陽淨瓶瓶錫四三羅山起滅悟道四四興陽妙翅飛走四五覺經四節經教四六德山學畢佛祖四七趙州柏樹祖教四八摩經不二門戶四九洞山供真真像五十雪峯甚麼菴居五一法眼舡陸舟楫五二曹山法身法身五三黃檗噇糟示眾卷四五四雲巖大悲心眼五五雪峯飯頭衣鉢五六密師白兔牛鹿五七嚴陽一物悟道五八剛經輕賤經教五九青林死蛇兔蛇六十鐵磨牸牛齋粥六一乾峯一畫橋路六二米胡悟否悟道六三趙州問死人境六四子昭承嗣法屬六五首山新婦佛祖六六九峯頭尾卷五六七嚴經智慧經教六八夾山揮劍佛祖六九南泉白牯七十進山問性骨董七一翠巖眉毛解結七二中邑獼猴飛走七三曹山孝滿服飾七四法眼質名經教七五瑞巖常理悟道七六首山三句示眾七七仰山隨分圓相七八雲門餬餅餬餅七九長沙進步骨董八十龍牙過板祖教八一玄沙到縣骨董八二雲門聲色餬餅卷六八三道吾看病問疾八四俱𦙁一指菴居八五國師塔樣帝王八六臨濟大悟棒喝八七疎山有無草木八八楞嚴不見經教八九洞山無草解結九十仰山謹白說法九一南泉牡丹花果九二雲門一寶珍寶九三魯祖不會珍寶九四洞山不安問疾九五臨濟一畫糧食九六九峯不肯遷化九七光帝幞頭帝王九八洞山常切說法九九雲門鉢桶齋粥一百瑯琊山河經教從容庵錄目錄終
