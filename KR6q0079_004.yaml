body:
  text: 侍者離知録後學性一校生生道人梓第五十四則雲巖大悲示衆云八面櫺櫳十方通暢一切處放光動地一切時妙用神通且道如何發現舉雲巖問道吾大悲菩薩用許多手眼作麼爾恁麼問圖個甚麼吾云如人夜間背手摸枕子一上神通不同小小巖云我會也且莫詐明頭吾云汝作麼生會果然放不過巖云遍身是手眼無空缺處吾云道即大曬道即得八成某甲舌頭短巖云師兄作麼生理長即就吾云通身是手眼無隔礙處師云李翱問鵝湖大悲用千手眼作麼湖云今上用公作麼昔有無目山人貨卜雨過泥途著鮮白鞋入市人問山人失明如何泥不污鞋山人舉拄杖云拄杖頭上有眼以山人為證夜間摸枕子手上有眼喫飯時舌上有眼聽語識人耳中有眼蘇子瞻與聾人說話寫字而已復笑云我與彼皆異人也我以手為口彼以眼為耳佛說六根互用信乎不疑無盡居士潞州紫巖大悲殿記舉大悲經楞嚴經最為詳細嘗見一說大悲昔為妙善公主乃天人為宣律師說然三十二應百億化身亦隨見不同各據其說也天覺曰千手者示引迷接物之多也千眼者示放光照暗之廣也苟無衆生無塵勞則一指不存而況千萬臂乎一瞬不具而況千萬目乎遍身通身何必不必似有淺深實無損益雲居示衆曰老僧二十年前住三峯庵時興化來曰權借一問以為影草時如何老僧當時機思遲鈍道不得為伊致得箇問頭奇特不敢辜他當時伊曰想庵主答這話不得不如禮拜了退而今思量當時不消道箇何必萬松道若教容易得後有化主到興化處化問山中和尚住三峯庵時老僧曾問伊話祇對不得而今道得也未化主舉前話了化曰雲居二十年只道得箇何必興化即不然爭如道箇不必萬松道鬪兔角之短長三聖云雲居二十年道得猶較他興化半月程萬松道競空花之濃淡僧問覺範如諸老宿所示有同異否範云佛令訥鈍比丘誦苕菷一日大悟得大辨才於此當見先德為物之心天童分上又作麼生頌云一竅虛通竪窮三際八面櫺櫳橫遍十方無象無私春入律應時納祐不留不礙月行空任運落前溪清淨寶目功德臂顧前盻後拈東掇西遍身何似通身是分疏不下現前手眼顯全機賊贓已露大用縱橫何忌諱無可不可師云天童道由一竅虛通便得八面櫺櫳也且如柳塘花塢暖日和風春在何處作何形段然能應物乘時不留不礙如月當天任運而轉知通身遍身背手摸枕底是甚麼人傀儡棚中必有抽牽線索者楞嚴說八萬四千清淨寶目八萬四千姥陀羅臂八萬四千爍迦羅首興化墮馬折臂頌云大悲菩薩有千手大丈夫兒誰不有且道那箇是通身底手眼師以手擘眼云猫第五十五則雪峯飯頭示衆云氷寒於水青出於藍見過於師方堪傳授養子不及父家門一世衰且道奪父之機者是甚麼人舉雪峯在德山作飯頭少不努力一日飯遲德山托鉢至法堂老不歇心峯云這老漢鐘未鳴鼓未響托鉢向甚麼處去教得孩兒會罵娘山便歸方丈盡在不言中峯舉似巖頭家返宅亂頭云大小德山不會末後句父為子隱直在其中山聞令侍者喚巖頭問汝不肯老僧那潑油救火巖遂啓其意人間私語天聞若雷山乃休去果然不會至明日升堂果與尋常不同隨風倒柁巖撫掌笑云且喜老漢會末後句家醜外揚他後天下人不奈伊何鼻孔為甚在我手裏師云雪峯低頭歸庵德山便歸方丈最好參詳巖頭密啓其意爾且道道甚麼德山又休去可謂相逢不拈出舉意便知有山至來日上堂果與尋常不同也是將錯就錯頭下至僧堂前拊掌大笑曰且喜老漢會末後句他後天下人不奈伊何切忌蓋覆將來雖然如是也只得三年德山果三年遷逝天覺頌鐘鼓聲沈捧鉢回巖頭一拶語如雷果然只得三年活莫是遭他授記來萬松道知爾被底穿曾共同床臥明招代德山云咄咄沒處去沒處去萬松道鼻孔在他人手裏雪竇云曾聞說箇獨眼龍元來只具一隻眼殊不知德山是箇無齒大蟲若不是巖頭識破爭得明日與作日不同諸人要會末後句麼只許老胡知不許老胡會半遮半掩漏逗也不知大溈哲云巖頭大似高山石裂直得百里走獸潛蹤若非德山度量深明爭得昨日與今日不同萬松道無齒大蟲爪距尚在魯祖凡見僧來便面壁南泉聞云我尋常向他道空劫已前承當佛未出世時會取尚不得箇半箇他恁麼驢年去若識得南泉便見巖頭更與天童把臂共行頌云末後句會也無這裏不得會不會打折腰德山父子太含胡外明不知裏暗座中亦有江南客勿謂秦無人莫向人前唱鷓鴣休得也師云末後句如此難明峻硬若德山頴俊如巖頭至今分雪不出不見道出身猶可易脫體道應難鄭谷詩花月樓臺近九衢清歌一曲倒金壺座中亦有江南客莫向春風唱鷓鴣天童用後兩句不勞再舉底意也舉著後如何師下座便歸方丈第五十六則密師白兔示衆云寧可永劫沈淪不求諸聖解脫提婆達多無間獄中受三禪樂鬱頭藍弗有頂天上墮飛狸身且道利害在甚麼處舉密師伯與洞山行次見白兔子面前走過密云俊哉爭奈荒草裏走山云作麼生怪儞遲也密云如白衣拜相自地升空易山云老老大大作這箇語話幾乎放過密云爾又作麼生人無害虎心虎無傷人意山云積代簪纓暫時落薄從空放下難師舉洞山與潭州神山僧密禪師過水山問過水事作麼生密云不濕腳山曰老老大大作這箇語話密曰汝又作麼生山云腳不濕教中有性修二門洞上名借功明位大抵因修而悟從凡入聖白衣庶民直拜冢宰若先悟後修從聖入凡積代簪纓本來尊貴雖飄零萬狀骨骼猶存所以道貧子喻中明此道獻珠偈裏顯張羅汝等諸人要見二尊宿見處麼看取天童一狀領過頌云抗力霜雪貧則獨善一身平步雲霄達則兼濟天下下惠出國苦瓠連根苦相如過橋甜瓜徹蒂甜蕭曹謀略能成漢葵花向日巢許身心欲避堯柳絮隨風寵辱若驚深自信悟須實悟參須實參真情參跡混漁樵未免靈龜曳尾師云蓬蒿貪雨露松柏耐風霜歲寒然後知松柏之後凋此隨緣不變之旨簪纓落薄之談有力大人堪任此事也平步雲霄一超直入如來地已是太遲也殊不知積代簪纓本來富貴論語柳下惠為士師三黜人曰子未可以去乎曰直道而事人安往而不三黜枉道而事人何必去父母之邦也司馬相如字犬子少喪父母九歲與人牧猪聞藺相如為卿相改名相如棄猪就學猪主杖之先生問知賢留門外草庵十年無書與讀遣去過升仙橋題柱曰若不乘駟馬車不過此橋後造得子虛賦將軍楊得意夜宿殿中誦此賦帝曰朕恨不與此人同時將軍奏曰見在蜀地帝命往召同乘駟馬車過橋封侍中蕭何曹參成漢高祖帝業巢父許由避堯洗耳飲牛老子云寵辱若驚得之若驚失之若驚以上四雙八事皆一句密老一句洞山妙哉圭峯舉喻譬如皇族淪落微賤習以性成後遇薦拔雖復本位三端六藝要重更改習學力用方全雖然天童分上猶落階級不見道寵辱若驚深自信真情參跡混漁樵第五十七則嚴陽一物示衆云弄影勞形不識形為影本揚聲止響不知聲是響根若非騎牛覓牛便是以楔去楔如何免得此過舉嚴陽尊者問趙州一物不將來時如何猶是分外州云放下著貼體衣衫會須脫却嚴云一物不將來放下箇甚麼人不知己過牛不知力大州云恁麼則擔取去喚不回頭爭奈何洪州武寧縣新興嚴陽尊者初參趙州問一物不將來時如何此與僧問報慈情生智隔相變體殊情未生時如何慈云隔暮故底道情也未生隔箇甚麼此與一物不將來放下箇甚麼孟八郎漢大同州云放不下則擔取去者言下大悟佛果法語舉黃龍頌云一物不將來兩肩擔不起果云明眼人難謾言下忽知非退步墮深坑心中無限喜如貧得寶毒惡既忘懷無始宿業盡時清淨蛇虎為知己異類等解寥寥千百年清風猶未已誰不景仰師所居常一蛇一虎手中與食故如得果人尊者稱之趙州古佛與尊者不測聖凡底人出一言發一問千古之下與人為龜鏡天童見近日師僧麁心轉盛所以打草驚蛇頌云不防細行輸先手黑白未分前猶是正中偏自覺心麁愧撞頭虎口裏下子局破腰間斧柯爛且道如今甚麼時節洗清凡骨共仙游頭輕眼明師云王介甫老持棊隱語云彼亦不敢先此亦不敢先唯其不敢先是以無所爭唯其無所爭是故入於不死不生棊乃爭先法贏則贏箇先手輸則輸箇頭撞趙州於爾未下子以前早先見數著嚴陽只管橫飛直逴剩占幾路不知斧柯已爛也王氏神仙傳晉隆安時信安縣王質採薪至眩室坂見石室四童子奕棊與質物如棗子含之不飢棊終斧柯爛於腰間衣袂隨風抵暮還家已數十年矣趙州放下著擔取去兩轉語抽筋拔髓換骨洗腸便與趙州把手共行步虛輕舉也有底道清閒真道本無事小神仙雖然莫將無事為無事往往事從無事生第五十八則剛經輕賤示衆云依經解義三世佛冤離經一字返同魔說因不收果不入底人還受業報也無舉金剛經云若為人輕賤我作糞中蟲是人先世罪業應墮惡道老僧最先入以今世人輕賤故叢林驢騾蹴踏龍象先世罪業則為消滅甚麼處去也師云見聞為種八難超十地之階解行在躬一生圓曠劫之果圭峯科此經為轉罪成佛此菩提煩惱不二生死涅盤不二梁昭明太子科判此經為能淨業障分傅大士頌先身有報障今日受持經暫被人輕賤轉重復還輕此正是依經解義也後面四句便有衲僧氣息道若了依他起能除遍計情常依般若觀何慮不圓成前四句功德力後四句觀行力六祖口訣云佛言持經之人合得一切人恭敬供養為多生有重業障故今生雖持此經常被人輕賤不得敬養自以持經故不起我人等相不問冤親常行恭敬有犯不校常修般若波羅蜜歷劫重罪悉皆消滅又約理而言先世即是前念妄心今世即是後念覺心以後念覺心輕賤前念妄心妄不能住故云先世罪業即為消滅妄念既滅罪業不成即得菩提此理事二解皆約觀行也僧問雲居承教有言是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅此意如何居云動則應墮惡道靜則為人輕賤崇壽稠云心外有法應墮惡道守住自己為人輕賤萬松道兩箇老漢俗氣也不除且道天童分上又作麼生頌云綴綴功過唯除頓覺人膠膠因果并法不隨順鏡外狂奔演若多腳下煙生杖頭擊著破竈墮百雜碎竈墮破靈從何生聖從何至來相賀伏惟墮㦬却道從前辜負我何不早道師云功即持經過即先業既立妄因必招妄果楞嚴云豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見嗔責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故此迷真執妄也般若觀照真也功過因果妄也真智現前妄業消滅阿耨菩提皎然本具此正教意衲僧分上如何嵩嶽破竈墮和尚山塢有廟殿安一竈烹宰祭祀不輟墮領侍者入廟以杖敲竈三下咄云此竈泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾墮破落安國師號為破竈墮須臾有一人青衣峨冠設拜云我本廟神久受業報今日蒙師說無生法脫此處生在天中特來致謝師曰是汝本有非吾強言神再拜而沒土瓦合成聖從何來無我人相般若智也以真智為妄業從來辜負今日相賀烹宰物命極多全無福利禪老敲三拄杖便得生天咄鬼怕惡人難展掌賊憑贓物易承頭第五十九青林死蛇示衆云去即留住住即遣去不去不住渠無國土何處逢渠在在處處且道是甚麼物得恁麼奇特舉僧問青林學人徑往時如何舉步即迂回林云死蛇當大路勸子莫當頭慣曾著毒僧云當頭時如何許爾大膽林云喪子命根果然僧云不當頭時如何怎只由爾林云亦無回避處築著磕著僧云正恁麼時如何且莫著忙林云却失也雖是死蛇解弄也活僧云未審向甚麼處去也不信搜懷林云草深無覓處頭上漫漫腳下漫漫僧云和尚也須隄防始得回來也林拊掌云一等是箇毒氣將謂侯白更有侯黑筠州洞山第三世師虔禪師初從夾山來參悟本本問近離何處林云武陵本曰武陵法道何似此間林云胡地冬抽笋本曰別甑炊香飯供養於此人師乃出去本曰此子向後走殺天下人去在林在洞山栽松有劉翁者從師求頌師示之曰尖尖三尺餘鬱鬱覆荒草不知何代人得見此老松翁呈悟本本曰賀翁之喜此人第三世洞山也林辭悟本之山南府青銼山住庵經十載忽憶悟本遺言乃曰當利群蒙豈拘於小節哉遂至隨州緣會衆請住土門小青林蘭若故號青林嘗曰汝等諸人直須離心意識參出凡聖路學方可保任若不如是非吾子息僧問學人徑往時如何這僧大悲閣下要去中都更誇知處直捷要路殊不知直下便是早太迂回也林以死蛇當大路拒之這僧不顧危亡道當頭者如何已著毒了也有底道何不棒喝行令林又何曾放過道喪子命根這僧稍覺痛癢待覓出身之路道不當頭者如何林云亦無回避處只這青林也免不得這僧筋舒力盡道正恁麼時左右無可奈何如何即是林曰却失也活人手段於斯乃見能遣能呼有擒有縱分付爾身上取摘不下與爾拈却便有下落僧云未審向甚麼處去也林云草深無覓處不道無只是不可見這僧也怪道和尚也隄防始得青林將一條死蛇招撥這僧末後却著腰纏腳遂拊掌一下云一等是箇毒氣萬松道熏天炙地無盡燈云青林樞機急峻非獨一時之光亦曠世為標式耳萬松道惱亂春風卒未休更看天童吹花擺柳頌云三老暗轉柁夜壑藏舟孤舟夜回頭澄源著棹蘆花兩岸雪自他玄契煙水一江秋上下冥通風力扶帆行不棹隨流得妙笛聲喚月下滄洲任運落前溪師云丹霞淳禪師頌長江澄徹印蟾華滿目清光未是家借問漁舟何處去夜深依舊宿蘆花二老同頌澄源湛水尚棹孤舟丹霞用雪竇頌玄沙和尚云本是釣魚船上客偶除鬚髮著袈裟祖佛位中留不住夜來依舊宿蘆花萬松道將謂別有古今詩話云川峽呼梢翁篙手為長年三老杜詩云蜀鹽吳麻自古通萬斛之舟行若風長年三老長歌裏白晝攤錢高浪中此事如人行船相似不著兩岸不住中流丹霞夜宿蘆花天童信風橫管且道轉柁回舟時作麼生夜深不向蘆灣宿逈出中間與兩頭第六十則鐵磨牸牛示衆云鼻孔昂藏各具丈夫相腳跟牢實肯學老婆禪透得無巴鼻機關始見正作家手段且道誰是其人舉劉鐵磨到溈山相見已了山云老牸牛汝來也撩蜂剔蝎磨云來日臺山大會齊和尚還去麼氣毒烟火然山放身臥半路抽身磨便出去一撥便轉師云溈山自稱水牯牛以鐵磨為牸牛安名賞號作家相見也他雖是尼久參溈山去山十里卓庵一日參子湖湖問莫是劉鐵磨否磨云不敢湖云左轉右轉磨云和尚莫顛倒湖便打看他與溈山放則雙放收便雙收佛果謂之隔身句意通而語隔要知意句俱到麼更看天童脫體頌出頌云百戰功成老太平安家樂業優柔誰肯苦爭衡饒人不是癡玉鞭金馬間終日雖有如無明月清風富一生受用不盡師云小僧多說佛老將不論兵山前麥未辨青黃廬陵米不知價利更論佛法誰曾夢見東漢陳蕃傳曰蕃能樹立風聲抗論昏俗而驅馳險隘之中與刑人腐夫爭衡二人相見不樹立風聲不驅馳險隘優游平易老成圓熟天童賞讚不盡何也得處自然忘計較用時全不費工夫第六十一則乾峯一畫示衆云曲說易會一手分付直說難會十字打開勸君不用分明語語得分明出轉難不信試舉看舉僧問乾峯十方薄伽梵一路涅盤門未審路頭在甚麼處快馬不如鈍坑峯以拄杖一畫云在這裏且信一半僧舉問雲門疑則別參門云扇子𨁝跳上三十三天築著帝釋鼻孔乞漢語東海鯉魚打一棒雨似盆傾會麼會麼恁麼解說更難理會師云越州乾峯禪師僧問十方薄伽梵一路涅盤門未審路頭在甚麼處此問本出楞嚴經第五此阿毗達磨十方薄伽梵一路涅盤門未審路頭門戶在甚麼處若依經解此義如來自說與圓通張本第六卷中文殊方揀圓通也若衲僧分上天童曾道十方無壁落從本來元沒遮欄四面亦無門只這裏便是入處所以乾峯一畫云在這裏不知者往往喚作乾峯與這僧指路不然道與這僧畫斷更不他游決不是這箇道理爾不見雲門注解得八米九糠黃龍南云乾峯一期指路曲為初機雲門乃通其變故使後人不倦萬松道曹溪波浪如相似無限平人被陸沈雲門久在乾峯曹山疏山這僧謂必知乾峯用處故求請益若却用乾峯針線乃繫驢橛也忽然拈出睦州秦時𨍏輅鑽只得盞子落地楪子成七片這僧不會乾峯意雲門別與一條活路大似潑油救火鼓扇消氷竹庵早曾點破頌云乾峯不用指陳雲門休打骨董自然東海鯉魚築著帝釋鼻孔竹庵更比雲門忒曬慈悲人越難會不如天童於冷眼不防却較些子頌曰入手還將死馬醫下霹靂手用狼虎藥返魂香欲起君危揭棺救死別有神方一期拶出通身汗藥不瞑眩厥疾弗瘳方信儂家不惜眉和頂𩕳沒却師云乾峯死馬醫醫不可這僧已是喪身失命底人雲門收得返魂香能令已死者再蘇拾遺傳漢延和元年西胡月氏音之國遣使獻香四兩大如雀卵色如桑椹至始元年京城大疫死者太半帝取香焚之其死未三日皆活香氣三月不歇香出聚窟洲人鳥山樹如楓香聞數里名返魂樹伐根玉釜煮汁黑粘一名驚精魂二名返生三名振檀四名却死天童小參云十分收得返魂香一等來撾塗毒鼓雲門一落索天童道是返魂香諸方變為塗毒鼓直教轉身吐氣不得把斷咽喉塞却鼻孔也百體汗流一場志公云忽悟本性元空恰似熱病得汗雖然萬松眉毛有幾莖第六十二則米胡悟否示衆云達磨第一義諦梁武頭迷淨名不二法門文殊口過還有入作分也無舉米胡令僧問仰山今時人還假悟否還曾迷麼山云悟即不無爭奈落第二頭何如何免得僧回舉似米胡是第幾胡深肯之肯即不無爭免第二師云京兆米禪師一曰米七師一曰米胡俗舍第七美髯因有二名八方珠玉嗣雪峯今據仰山同參嗣溈山這僧正問自古上賢還達真正理麼胡曰達僧云只如真正理作麼生達此與假悟底時節不殊胡云當時霍光賣假銀城與單于契書是甚麼人做佛果稱胡為大善知識名不虛傳僧曰某直得杜口無言胡曰平地教人作保只如米胡道達仰山道悟即不無爭奈落第二頭何若不假悟又道唯人自肯乃方親勝默和尚常謂投子拈古內秀俏措無賽嘗拈此話云然仰山恁麼道即得還免得自己落麼若免得更有一人大不肯在若免不得亦落第二頭米胡雖然肯他自己還有出身之路也無諸人試點檢看若點檢得出兩人瓦解氷消若點檢不得且莫造次頌云碧岫峯頭借問人指山窮處未安身雖然免得重陽令爭似靈苗不犯春萬松道不得春風花不開及至花開又吹落忠國師問紫璘供奉佛是何義璘曰是覺義國師曰佛曾迷否璘曰不曾迷國師曰用覺作麼璘無對此亦本無迷悟之意也常愛雪竇道本無迷悟數如麻獨許靈雲是作家悟即落第二頭不悟又唯人自肯如何即是天童自有方便頌云第二頭分悟破迷普州人送賊快須撒手捨筌罤放下著功兮未盡成駢拇終是分外智也難知覺噬臍禹力不到處河聲流向西兔老氷盤秋露泣戀著即不堪鳥寒玉樹曉風凄坐著即不可持來大仰辨直假一點難謾痕玷全無貴白圭切忌觸破師云第二頭分悟破迷明來暗謝智起惑亡皆是途中事周易略例罤者所以在兔得兔而忘罤筌者所以在魚得魚而忘筌然則言者象之罤也象者意之筌也存言者非得象者也存象者非得意者也若向第二頭道少他悟達一回不得爭奈道設有妙悟亦須吐却快須撒手到家更無一物始忘罤捨筌功夫智識盡屬第二頭及盡功夫不可智知始得少分相應莊子外篇駢拇第八云駢於足者連無用之肉枝於手者樹無用之指注駢拇足大指連第二指也枝指六指也功若不盡如駢拇連無用之肉也春秋楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍注云不及也智不到處智不能知兔老圓月也丹霞淳和尚道水澄月滿道人愁氷盤秋露泣戀著即不堪也大荒經崑崙丘上有琅玕玉樹結子如珠而小也玄中銘靈木迢然鳳無依倚與鶴不停機皆不許守戀坐著也鳥寒而凄不欲落他根株枝葉也詩抑篇白圭之玷尚可磨也玉內病曰瑕體破也外病曰玷色污也此頌仰山貴白圭無玷不落第二頭如何是第一頭大悟後方知不是第六十三則趙州問死示衆云三聖雪峯春蘭秋菊趙州投子卞璧燕金無星稱上兩頭平沒底船中一處渡二人相見時如何舉趙州問投子大死底人却活時如何探竿在手子云不許夜行投明須到影草隨身師云舒州投子山大同禪師初謁翠微無學禪師適遇堂上經行次而便前進接禮問西來密意師如何示人微駐步顧視之子曰乞師指示微曰更要第二杓惡水那子忽省契拜謝而退微曰子無墮却子曰時至根苗自生他日偶問如何是佛理微曰佛則不理子曰莫落空否微曰真空不空因示讖頌曰佛理何曾理真空又不空大同居寂住敷演我師宗子還本鄉桐城投子山趙州始於桐城相見州曰莫是投子庵主麼子曰茶監錢施我一文州先上山子携油瓶後至州曰久響投子到來只見賣油翁子曰爾只見賣油翁且不識投子州曰如何是投子子提起油瓶曰油油子置茶筵相待自過胡餅與趙州州不管子令侍者過胡餅州禮侍者三拜且道他意如何蘇州永光真禪師上堂云言鋒若差鄉關萬里直須懸崖撒手自肯承當絶後再蘇欺君不得趙州將此意問若非投子卒難搆副是他便道不許夜行投明須到此與尋常不脫皮要白柳棒底言意似同就理正與趙州問頭相應州云我早侯白伊更侯黑子由是道聲集衆奏請應讖名寂住院白雲端頌死去活來牙尚露投明須到已先行誰家別館池溏裏一對鴛鴦畫不成試看天童一筆丹青頌云芥城劫石妙窮初及盡今時始得成立活眼環中照廓虛絶後重蘇欺君不得不許夜行投曉到已涉程途家音未肯付鴻魚已是妄傳消息師云智度論有城四方百由旬滿中芥子百年取一粒芥子盡劫未盡劫石者梵語劫波此云時分樓炭經有一大石方四十里百歲諸天來以羅穀衣拂石盡劫猶未盡窮盡此芥城劫石此乃及盡今時却到空劫以前時然後眼活也環中者莊子樞始得其環中以應無窮此言循環而無窮得其環中者也環中虛處體也循環無窮用也詩傳云大曰鴻小曰雁西漢使謂單于曰天子於上林射得雁雁足有蘇武繫書由是單于不敢欺漢蔡伯喈女名琰字文姬與董嗣作妻㳂邊為理嗣巡綽被番人虜琰與王為妃思鄉修書蠟彈內繫雁頸上雁至漢地飲水彈落魚吞漁人剖魚得書知琰所在此頌不許夜行投明須到不曾家醜外揚妄通消息雖然上覆天童適來侍者謝傳法誨第六十四則子昭承嗣示衆云韶陽親見睦州拈香於雪老投子面承圓鑒嗣法於大陽珊瑚枝上玉花開薝蔔林中金果熟且道如何造化來舉子昭首座問法眼和尚開堂承嗣何人早知今日成間管悔不當時用好心眼云地藏恩歸有地昭云太辜負長慶先師肘膊不向外曲眼云某甲不會長慶一轉語佯打不知昭云何不問引得狼來屋裏屙眼云萬象之中獨露身意作麼生覿面相呈昭乃竪起拂子兩重公案眼云此是長慶處學得底首座分上作麼生劈筈奪窠昭無語只跳得一跳眼云只如萬象之中獨露身是撥萬象不撥萬象却被葫蘆倒繳藤昭云不撥話作兩橛眼云兩箇明眼難謾參隨左右皆云撥萬象轉見不堪眼云萬象之中獨露身聻兩彩一賽師云法眼久參長慶稜既嗣地藏長慶下昭首座平昔與師商榷古今中心憤之即領衆特詣撫州責問師知舉衆出迎特加禮待賓主位各挂拂子一枝茶次昭忽變色抗聲曰長老開堂的嗣何人師曰地藏昭曰何太辜負長慶先師某同在會下數十餘載商量古今曾無間隔因何却嗣地藏此事不在多年也不在久學如一宿覺高亭簡豈可外人評量昭首座黨護門風不通議論橫生譏剝法眼當時深愍此輩不通方者作十規論誡之學者不可不覽且人情之與道力優劣天懸故將本分事酬他道我不會一轉因緣是他大方之家不辨不爭却將長慶會下當年曾熟論底事校證昭以舊日相待才與拶著七華八裂參隨急救轉見不堪可謂陳敗不禁苕菷掃也昭與衆懡㦬而退眼方略與止住曰首座殺父殺母猶通懺悔謗大般若誠難懺悔昭竟無對自此却參眼發明己見更不開堂古人惡來善應嗔來慈應然後以平等佛慧而開發之此子昭首座還嗣法眼猶不足以酬厚德洗初心也天童只將昭公問處法眼末後一句頌之自然頭正尾正頌云離念見佛草枯鷹眼疾破塵出經雪盡馬蹄輕現成家法不少不剩誰立門庭盡從這裏流出月逐舟行江練淨一多無礙去住自由春隨草上燒痕青頭上薦取夾山撥不撥轉必兩頭走聽叮嚀事不厭細三徑就荒歸便得下坡不走舊時松菊尚芳馨快便難逢師云圓覺序道心本是佛由念起而漂沈岸實不移因舟行而騖驟華嚴經道有一大經卷量等三千界在一微塵中一切塵亦然有一明眼人破塵出經卷利濟一切人天童引兩本大經集成一聯頌撥萬象者且萬象誰萬象獨露誰獨露此現成公案家法常存誰更立門庭開戶牖華嚴宗三舟玩月各逐舟行一道澄江千里孤應惠崇詩河分岡勢斷春入燒痕青謝玄暉詩餘霞散成綺澄江淨如練月逐三舟春隨百草三舟百草萬象也月之與春獨露也天童頌見撥與不撥大曬心麁這裏只宜叮嚀子細不見子方上座亦自長慶至眼亦舉前話問方亦舉拂子眼曰恁麼又爭得方曰和尚尊意如何眼曰喚甚麼作萬象方曰古人不撥萬象眼曰萬象之中獨露身說甚麼撥不撥方忽悟法眼前話末後道萬象之中獨露身聻此話末後又道萬象之中獨露身說甚麼撥不撥可謂欲去便歸歸便得算來田地苦無多昭公方公究妙失宗濁智流轉之過也陶淵明歸去來辭三徑就荒松菊猶存蔣詡字元卿開三徑唯羊仲求仲從交游此頌法眼承言會宗開發二師之妙不失長慶之旨如何是長慶旨萬象之中獨露身第六十五則首山新婦示衆云吒吒沙沙剝剝落落刀刀蹶蹶漫漫汗汗沒可咬嚼難為近傍且道是甚麼話舉僧問首山如何是佛可曬新鮮山云新婦騎驢阿家牽是何道理師云汝州寶應省念禪師蔡州人姓狄氏參風穴穴示衆云昔日世尊以青蓮花目顧視迦葉正當恁麼時且道說箇甚麼首山便下去侍者入室請益曰念法華為甚麼不祗對和尚穴云念法華會也次日山與真園頭汝州廣慧真也同上立侍次穴云作麼生是世尊不說說真曰鵓鳩樹頭鳴意在麻畬裏穴云爾作許多癡福作甚麼何不體究言句仍問山爾作麼生山云動容揚古路不墮悄然機穴語真曰爾何不看念法華下語山後出世上堂云要得親切莫將問來問在答處答在問處若將問來老僧在汝腳底汝若擬議則沒交涉一日拈竹篦云汝若喚作竹篦即觸不喚作竹篦即背汝諸人且喚作甚麼葉縣省和尚掣得折作兩截拋向階下却云是甚麼山云瞎縣便禮拜諸方喚作背觸關俗諺有云顛倒顛新婦騎驢阿家牽佛國頌云首山有語古今傳此語休云返倒顛新婦醉騎驢子去時人笑殺阿家牽不似天童頌得可喜頌云新婦騎驢阿家牽草木不勞拈出體段風流得自然描不成畫不就堪笑學顰鄰舍女弄巧成拙向人添醜不成妍取笑傍觀師舉圓通秀鐵壁頌云何勞一日三梳頭扎得根牢即便休大抵輸他肌骨好不塗紅粉也風流首山答話不用緣飾自然婆婦體段俏措如西施心痛捧心而顰更益其美醜女學顰更益其醜此責口耳之學不務妙悟者一心也待做風流四枝八脈傍不肯第六十六則九峯頭尾示衆云神通妙用底放腳不下忘緣絶慮底擡腳不起可謂有時走殺有時坐殺如何得恰好去舉僧問九峯如何是頭高超威音之前峯云開眼不覺曉明不越戶僧云如何是尾獨步劫空之後峯云不坐萬年床穴不棲巢僧云有頭無尾時如何先行不到峯云終是不貴奴見婢殷勤僧云有尾無頭時如何末後大過峯云雖飽無力有甚麼用處僧云直得頭尾相稱時如何君臣道合上下和同峯云兒孫得力室內不知各安其分師云筠州九峯道虔禪師福州官懷人姓劉氏雖遍經法席而受印于石霜初住九峯玄徒尤盛後居洪州泐潭而終敕諡大覺一日僧問如何是頭若是道眼不通明差別智不具論箇頭尾先後心懵然不知下落峯云開眼不覺曉曾有僧問人人盡言請益未審師將何法拯濟峯云汝道巨嶽還曾乏寸土麼僧云恁麼則四海參尋當為何事峯云演若迷頭心自狂僧云還有不狂者麼峯云有僧云如何是不狂者峯云突曉途中眼不開這箇便是開眼不覺曉底榜樣僧云如何是尾峯云不坐萬年床又有僧問如何是然燈前峯云勤勞不得力僧云如何是正然燈峯云頭大尾小僧云如何是然燈後峯云退位不知間此是不坐萬年床底榜樣也僧云有頭無尾時如何峯云終是不貴開眼覺曉也僧云有尾無頭時如何峯云雖飽無力退位知間也僧云直得頭尾相稱時如何峯云兒孫得力飽而有力也室內不知終是尊貴也宗鏡録曰入吾宗中先須知有然後保任又曰頭尾須得相稱不可理行有闕心口相違若入宗鏡理行俱圓石霜九峯師也示衆云初機未搆大事先須識取頭其尾自至疏山出問如何是頭霜曰直須知有疏曰如何是尾霜曰盡却今時疏曰有頭無尾時如何霜曰吐得黃金堪作甚麼疏曰有尾無頭時如何霜曰猶有依倚在疏曰直得頭尾相稱時如何霜曰渠不作箇會解亦未許渠在故九峯曰諸上座古人說箇頭也只令汝知有說箇尾只教汝盡却今時有如許多不相應底事所以教汝向這裏屏當却銷磨却令汝今日相應去成辦去若是當人體爾真實恆如不可更恁麼說話也雖然如是須是箇人始得且莫異口同音快須努力珍重萬松以九峯公案證九峯公案注也注了說也說破其餘意味分付天童頌云規圓矩方碗兒團圞盤兒四角用行舍藏升兒裏回斗兒裏轉鈍躓棲蘆之鳥豈解高飛遠揚進退觸藩之羊不能獨步大方喫人家飯快須吐却臥自家床切忌生根雲騰致雨春生夏長露結為霜秋收冬藏玉線相投透針鼻聯綿無間錦絲不斷吐梭腸翻覆通同石女機停兮夜色向午文彩縱橫意自殊木人路轉兮月影移央解行不觸今時道師云縱橫得妙左右逢原底人莊子所謂圓者中規方者中矩子謂顏淵曰用之則行舍之則藏唯我與爾有是夫如其不然則膠柱調絃刻舟記劍也寶藏論夫進修之由中有萬途困魚止泊鈍鳥棲蘆其二者不識於大海不識於叢林人趣乎小道其義亦然周易大壯卦上六羝羊觸藩不能退不能進無攸利艱則吉喫別人家飯臥自己床如云喫官飯放私駝又云解將冷口喫人熱食者難得出則為雲為雨入則氷結霜凝此乃乍出乍入未是作家直得針線貫通毫芒綿密機絲不挂文彩縱橫正當石女機停時已早木人路轉正當夜色向午處已早月影移央此末後兩句只是一句今時儒學文章士謂之隔句對萬松恁麼離堅合異要與天童相見諸人不得辜負九峯
